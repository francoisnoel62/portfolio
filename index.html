<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>François Noël — développeur fullstack senior</title>
<meta name="description" content="Portfolio de François Noël, développeur fullstack senior orienté produit, backend Django, frontend Next.js et usages IA concrets." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0B0E14;
    --titlebar:#0E121B;
    --sidebar:#0A0D13;
    --panel:#0C0F17;
    --card:#10141E;
    --card-2:#131826;
    --border:#1B2230;
    --border-soft:rgba(255,255,255,.055);
    --text:#C7CFDB;
    --bright:#EAEEF5;
    --muted:#79818F;
    --faint:#4E5664;
    --accent:#E08A57;   /* clay — actions, caret, active */
    --cyan:#6FD9D0;     /* agent names */
    --green:#56C98C;    /* online / success */
    --violet:#9B8CFF;   /* keywords */
    --yellow:#E0B341;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
    --sans:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#05070B;color:var(--text);font-family:var(--sans);
    font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden;
  }
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:#1a1207}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#1f2735;border-radius:6px;border:2px solid var(--panel)}
  ::-webkit-scrollbar-thumb:hover{background:#2a3346}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ===== window shell ===== */
  .app{
    height:100vh;height:100dvh;display:flex;flex-direction:column;
    background:var(--bg);overflow:hidden;
  }
  @media(min-width:1000px){
    .app{margin:0 auto;max-width:1280px;height:100vh;
      border-left:1px solid var(--border);border-right:1px solid var(--border)}
  }

  /* title bar */
  .titlebar{
    height:42px;flex:0 0 42px;display:flex;align-items:center;gap:14px;
    padding:0 14px;background:var(--titlebar);border-bottom:1px solid var(--border);
    font-family:var(--mono);font-size:12px;color:var(--muted);
  }
  .lights{display:flex;gap:8px}
  .lights i{width:12px;height:12px;border-radius:50%;display:block}
  .lights i:nth-child(1){background:#E0635E}
  .lights i:nth-child(2){background:#E0B341}
  .lights i:nth-child(3){background:#56C98C}
  .titlebar__name{flex:1;text-align:center;color:var(--muted);letter-spacing:.02em}
  .titlebar__name b{color:var(--text);font-weight:500}
  .titlebar__ico{color:var(--faint);letter-spacing:.1em}

  /* tabs */
  .tabs{
    height:38px;flex:0 0 38px;display:flex;align-items:stretch;
    background:var(--sidebar);border-bottom:1px solid var(--border);
    overflow-x:auto;scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    display:flex;align-items:center;gap:8px;padding:0 16px;cursor:pointer;
    font-family:var(--mono);font-size:12px;color:var(--muted);
    border-right:1px solid var(--border);white-space:nowrap;
    background:transparent;border-top:2px solid transparent;transition:.15s;
  }
  .tab .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);opacity:.7}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--bright);background:var(--panel);border-top-color:var(--accent)}

  /* main split */
  .shell{flex:1;display:grid;grid-template-columns:264px minmax(0,1fr);min-height:0}

  /* sidebar */
  .side{
    background:var(--sidebar);border-right:1px solid var(--border);
    display:flex;flex-direction:column;min-height:0;
  }
  .side__h{
    padding:14px 16px 10px;font-family:var(--mono);font-size:11px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--faint);
    display:flex;justify-content:space-between;align-items:center;
  }
  .side__count{color:var(--green)}
  .agents{padding:2px 8px 10px;overflow-y:auto;flex:1;min-height:0}
  .agent{
    display:flex;gap:10px;padding:10px 10px;border-radius:6px;cursor:pointer;
    transition:.15s;opacity:0;transform:translateX(-8px);align-items:flex-start;
  }
  .agent.in{opacity:1;transform:none}
  .agent:hover{background:var(--card)}
  .agent.active{background:var(--card-2)}
  .agent__dot{
    margin-top:5px;width:8px;height:8px;border-radius:50%;background:var(--green);
    flex:0 0 8px;box-shadow:0 0 0 0 rgba(86,201,140,.6);
  }
  .agent.busy .agent__dot{background:var(--yellow);animation:pulse 1s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,179,65,.5)}70%{box-shadow:0 0 0 6px rgba(224,179,65,0)}100%{box-shadow:0 0 0 0 rgba(224,179,65,0)}}
  .agent__meta{min-width:0}
  .agent__name{font-family:var(--mono);font-size:13px;color:var(--cyan);font-weight:500}
  .agent__role{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.35}
  .side__f{padding:12px 16px;border-top:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--faint)}
  .side__f b{color:var(--muted);font-weight:500}

  /* chat panel */
  .panel{display:flex;flex-direction:column;min-height:0;min-width:0;background:var(--panel)}
  .log{flex:1;overflow-y:auto;padding:26px 30px 40px;min-height:0;scroll-behavior:smooth}
  .log__inner{max-width:760px;margin:0 auto}

  .msg{margin-bottom:22px}
  .msg.user{font-family:var(--mono);font-size:13px;color:var(--text)}
  .msg.user .caret{color:var(--accent);margin-right:8px}
  .msg.user .cmd{color:var(--bright)}

  .ag{border-left:2px solid var(--border);padding-left:16px}
  .ag__head{display:flex;align-items:center;gap:9px;margin-bottom:10px}
  .ag__badge{width:22px;height:22px;border-radius:5px;background:var(--card-2);
    display:grid;place-items:center;font-family:var(--mono);font-size:12px;color:var(--cyan);
    border:1px solid var(--border)}
  .ag__name{font-family:var(--mono);font-size:12.5px;color:var(--cyan)}
  .ag__role{font-family:var(--mono);font-size:11px;color:var(--faint)}

  .tool{font-family:var(--mono);font-size:12px;color:var(--muted);margin:8px 0;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tool .gear{color:var(--violet)}
  .tool .fn{color:var(--text)}
  .tool .arg{color:var(--yellow)}
  .tool .res{color:var(--green)}
  .tool .spin{color:var(--yellow);animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:.25}}

  .prose{font-size:14.5px;line-height:1.7;color:var(--text);margin:6px 0}
  .prose .hl{color:var(--bright);font-weight:600}
  .prose .clay{color:var(--accent);font-weight:600}
  .cursor::after{content:"▋";color:var(--accent);animation:blink 1s steps(1) infinite;margin-left:1px}

  .note{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin:6px 0}

  /* timeline */
  .tl{margin:14px 0 4px;display:flex;flex-direction:column;gap:2px}
  .tl__row{display:grid;grid-template-columns:96px 1fr;gap:16px;padding:12px 0;
    border-top:1px solid var(--border-soft);opacity:0;transform:translateY(8px);transition:.45s}
  .tl__row.in{opacity:1;transform:none}
  .tl__yr{font-family:var(--mono);font-size:11.5px;color:var(--accent)}
  .tl__t{color:var(--bright);font-weight:600;font-size:14.5px;margin-bottom:3px}
  .tl__d{color:var(--muted);font-size:13px;line-height:1.55}

  /* cards */
  .cards{display:flex;flex-direction:column;gap:10px;margin:14px 0 4px}
  .pcard{border:1px solid var(--border);border-radius:8px;padding:16px 18px;background:var(--card);
    opacity:0;transform:translateY(8px);transition:.45s}
  .pcard.in{opacity:1;transform:none}
  .pcard:hover{border-color:#28324a}
  .pcard__top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
  .pcard__t{font-family:var(--mono);font-size:14px;color:var(--bright);font-weight:600}
  .pcard__when{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .pcard__d{color:var(--muted);font-size:13px;line-height:1.55;margin:8px 0 0}
  .pcard__lead{border-color:#2a2018;background:linear-gradient(180deg,#15110c,var(--card))}
  .pcard__lead .pcard__t{color:var(--accent)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .tag{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--border);
    padding:3px 8px;border-radius:4px}
  .lnk{font-family:var(--mono);font-size:12px;color:var(--accent);display:inline-block;margin-top:12px;
    border-bottom:1px solid transparent;transition:.15s}
  .lnk:hover{border-color:var(--accent)}

  /* stack columns */
  .scols{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:14px 0 4px}
  .scol{opacity:0;transform:translateY(8px);transition:.45s}
  .scol.in{opacity:1;transform:none}
  .scol__h{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .scol__h i{width:7px;height:7px;border-radius:50%;display:block}
  .scol--ai .scol__h i{background:var(--cyan)}
  .scol--code .scol__h i{background:var(--violet)}
  .scol--craft .scol__h i{background:var(--accent)}
  @media(max-width:620px){.scols{grid-template-columns:1fr;gap:14px}}

  /* contact */
  .contact{margin:14px 0 4px;opacity:0;transform:translateY(8px);transition:.45s}
  .contact.in{opacity:1;transform:none}
  .cbtns{display:flex;flex-wrap:wrap;gap:10px}
  .cbtn{font-family:var(--mono);font-size:12.5px;display:inline-flex;align-items:center;gap:7px;
    padding:9px 14px;border:1px solid var(--border);border-radius:6px;color:var(--text);transition:.18s}
  .cbtn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
  .cbtn--solid{background:var(--accent);color:#1a1207;border-color:var(--accent);font-weight:600}
  .cbtn--solid:hover{filter:brightness(1.08);color:#1a1207}
  .cmeta{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:14px;display:flex;gap:8px 18px;flex-wrap:wrap}

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 4px}
  .chip{font-family:var(--mono);font-size:12.5px;cursor:pointer;background:var(--card-2);
    border:1px solid var(--border);color:var(--text);padding:8px 13px;border-radius:20px;transition:.18s}
  .chip:hover{border-color:var(--cyan);color:var(--cyan);transform:translateY(-1px)}

  /* recruiter proof blocks */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0 8px}
  .metric{border:1px solid var(--border);border-radius:8px;background:var(--card);padding:12px 13px;
    opacity:0;transform:translateY(8px);transition:.45s}
  .metric.in{opacity:1;transform:none}
  .metric__v{font-family:var(--mono);font-size:18px;color:var(--bright);font-weight:700;line-height:1}
  .metric__l{font-size:12px;color:var(--muted);line-height:1.35;margin-top:7px}
  .signals{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0 4px}
  .signal{border:1px solid var(--border);border-radius:8px;background:var(--card);padding:14px 15px;
    opacity:0;transform:translateY(8px);transition:.45s}
  .signal.in{opacity:1;transform:none}
  .signal__k{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.08em}
  .signal__t{color:var(--bright);font-weight:600;margin-top:7px}
  .signal__d{color:var(--muted);font-size:13px;line-height:1.5;margin-top:5px}
  .pcard__proof{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-top:12px}
  .proof{font-family:var(--mono);font-size:11px;color:var(--text);border:1px solid var(--border);
    background:rgba(255,255,255,.025);border-radius:5px;padding:6px 8px}
  .proof b{color:var(--accent);font-weight:600}
  .scol__d{font-size:13px;color:var(--muted);line-height:1.55;margin:-2px 0 10px}
  @media(max-width:700px){.metrics,.signals{grid-template-columns:1fr 1fr}.pcard__proof{grid-template-columns:1fr}}
  @media(max-width:430px){.metrics,.signals{grid-template-columns:1fr}}

  /* input dock */
  .dock{flex:0 0 auto;border-top:1px solid var(--border);background:var(--sidebar);padding:14px 30px}
  .dock__inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:12px;
    background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 8px 6px 16px}
  .dock__inner:focus-within{border-color:#33405c}
  .dock__caret{color:var(--accent);font-family:var(--mono);font-size:14px}
  #input{flex:1;background:transparent;border:none;color:var(--bright);font-family:var(--mono);
    font-size:13.5px;outline:none;padding:10px 0}
  #input::placeholder{color:var(--faint)}
  .send{font-family:var(--mono);font-size:12px;display:inline-flex;align-items:center;gap:7px;
    background:var(--accent);color:#1a1207;font-weight:600;border:none;border-radius:7px;
    padding:9px 14px;cursor:pointer;transition:.15s}
  .send:hover{filter:brightness(1.08)}
  .send:disabled{opacity:.4;cursor:not-allowed}
  .dock__hint{max-width:760px;margin:8px auto 0;font-family:var(--mono);font-size:11px;color:var(--faint)}
  .dock__hint b{color:var(--muted);font-weight:500}

  /* status bar */
  .status{height:30px;flex:0 0 30px;display:flex;align-items:center;gap:18px;padding:0 16px;
    background:#0E121B;border-top:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--muted)}
  .status .seg{display:flex;align-items:center;gap:7px}
  .status .online{color:var(--green)}
  .status .online i{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
  .status .right{margin-left:auto;display:flex;gap:18px}
  .status .clay{color:var(--accent)}
  .meter{display:inline-block;width:54px;height:6px;border-radius:3px;background:#1c2433;overflow:hidden;vertical-align:middle}
  .meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--yellow));transition:width 1.2s ease}

  /* featured agent (book) */
  .agent--feature{background:linear-gradient(180deg,#16110b,transparent);border:1px solid #2a2018}
  .agent--feature .agent__name{color:var(--accent)}
  .agent--feature .agent__dot{background:var(--accent);box-shadow:0 0 0 0 rgba(224,138,87,.6);animation:pulse2 2.4s infinite}
  @keyframes pulse2{0%{box-shadow:0 0 0 0 rgba(224,138,87,.45)}70%{box-shadow:0 0 0 6px rgba(224,138,87,0)}100%{box-shadow:0 0 0 0 rgba(224,138,87,0)}}
  .agent__tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--yellow);
    border:1px solid #2a2018;border-radius:4px;padding:1px 5px;margin-left:7px;vertical-align:middle}

  /* book cover block */
  .book{display:grid;grid-template-columns:210px 1fr;gap:22px;margin:14px 0 4px;opacity:0;transform:translateY(8px);transition:.45s}
  .book.in{opacity:1;transform:none}
  .book__cover{border:1px solid #2a2018;border-radius:8px;padding:20px 18px;position:relative;overflow:hidden;
    min-height:240px;display:flex;flex-direction:column;background:linear-gradient(160deg,#1b130c,#0d0a07)}
  .book__cover::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(var(--accent),var(--yellow))}
  .book__kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--yellow)}
  .book__title{font-family:var(--mono);font-size:21px;font-weight:700;color:var(--bright);margin-top:auto;line-height:1.08}
  .book__sub{font-size:13px;color:var(--accent);margin-top:9px;line-height:1.3;font-weight:500}
  .book__meta{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:14px}
  .book__lead{font-size:14.5px;line-height:1.7;color:var(--text);margin:0 0 4px}
  .book__six{margin:14px 0;display:flex;flex-direction:column;gap:8px;counter-reset:err}
  .book__six div{font-size:13px;color:var(--muted);padding-left:28px;position:relative;line-height:1.5}
  .book__six div::before{counter-increment:err;content:counter(err);position:absolute;left:0;top:1px;
    font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid var(--border);border-radius:4px;
    width:19px;height:19px;display:grid;place-items:center}
  .book__six b{color:var(--text);font-weight:600}
  @media(max-width:620px){.book{grid-template-columns:1fr;gap:16px}.book__cover{min-height:180px}}

  /* manuscript reader */
  .mdreader{margin:18px 0 4px;border:1px solid var(--border);border-radius:8px;background:#080B11;
    overflow:hidden;opacity:0;transform:translateY(8px);transition:.45s}
  .mdreader.in{opacity:1;transform:none}
  .mdreader__bar{height:34px;display:flex;align-items:center;gap:8px;padding:0 10px;background:var(--sidebar);
    border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--muted)}
  .mdreader__tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
  .mdreader__tabs::-webkit-scrollbar{display:none}
  .mdtab{font-family:var(--mono);font-size:11px;color:var(--muted);background:transparent;border:1px solid transparent;
    border-radius:5px;padding:5px 8px;cursor:pointer;white-space:nowrap}
  .mdtab.on{color:var(--bright);background:var(--card);border-color:var(--border)}
  .mdreader__body{display:grid;grid-template-columns:178px minmax(0,1fr);min-height:360px;max-height:560px}
  .mdreader__tree{border-right:1px solid var(--border);background:var(--sidebar);padding:12px 10px;font-family:var(--mono);
    font-size:11px;color:var(--muted)}
  .mdreader__folder{color:var(--faint);margin-bottom:8px}
  .mdfile{display:block;width:100%;text-align:left;font-family:var(--mono);font-size:11px;color:var(--muted);
    background:transparent;border:none;border-radius:5px;padding:6px 7px;cursor:pointer}
  .mdfile.on{color:var(--accent);background:var(--card)}
  .mdcode{overflow:auto;padding:14px 0;background:#080B11;font-family:var(--mono);font-size:12.5px;line-height:1.65}
  .mdline{display:grid;grid-template-columns:46px minmax(0,1fr);min-height:20px}
  .mdln{color:#384151;text-align:right;padding-right:12px;user-select:none}
  .mdtxt{white-space:pre-wrap;color:var(--text);padding-right:18px}
  .mdtxt.h1{color:var(--bright);font-weight:700;font-size:15px}
  .mdtxt.h2{color:var(--accent);font-weight:600}
  .mdtxt.code{color:var(--green)}
  @media(max-width:700px){.mdreader__body{grid-template-columns:1fr;max-height:560px}.mdreader__tree{display:none}.mdcode{font-size:12px}}

  /* language toggle (status bar) */
  .langtog{display:inline-flex;border:1px solid var(--border);border-radius:5px;overflow:hidden}
  .langtog button{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;background:transparent;
    color:var(--muted);border:none;padding:3px 9px;cursor:pointer;transition:.15s;line-height:1.4}
  .langtog button.on{background:var(--accent);color:#1a1207;font-weight:600}
  .langtog button:not(.on):hover{color:var(--text)}

  /* mobile */
  @media(max-width:780px){
    body{-webkit-tap-highlight-color:transparent}
    .titlebar{height:40px;flex-basis:40px;gap:10px;padding:0 12px}
    .titlebar__name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .titlebar__ico{display:none}
    .shell{grid-template-columns:minmax(0,1fr);grid-template-rows:auto 1fr}
    .side{border-right:none;border-bottom:1px solid var(--border);min-width:0;overflow:hidden}
    .side__h{padding:9px 14px 6px}
    .agents{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding:2px 12px 11px;flex:0 0 auto;
      min-width:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .agents::-webkit-scrollbar{display:none}
    .agent{flex:0 0 auto;width:auto;min-width:140px;max-width:230px;background:var(--card);padding:9px 12px}
    .agent--feature{background:linear-gradient(180deg,#16110b,var(--card))}
    .agent__role{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .side__f{display:none}
    .log{padding:18px 16px 30px}
    .log__inner{max-width:none}
    .prose{font-size:15px}
    .dock{padding:12px 14px}
    .dock__inner{padding:4px 6px 4px 13px}

  var BOOK_CHAPTERS = [
  {
    "file": "chapter-01.md",
    "title": "Chapitre 1 - L'agent n'est pas le marteau universel",
    "md": "# Chapitre 1 - L'agent n'est pas le marteau universel\n\nL'agent n'est pas le marteau universel\nIl y a un biais que j'ai observé chez presque tous les développeurs qui\ndécouvrent les agents ; moi y compris.\nOn vient de finir son premier agent en démo. Ça marche. Le modèle raisonne, il\nappelle des outils, il produit un résultat. On est impressionné. Et alors un réflexe\ns'installe : \"Et si j'utilisais ça pour...?\"\nPour automatiser les rapports. Pour trier les emails. Pour valider les dépenses.\nPour planifier les réunions. Pour tout.\nC'est le réflexedu marteau. Quand tu as un marteau, tout ressemble à un clou.\nLe problème, c'est que les agents ne sont pas des marteaux. Ce sont des outils\nspécialisés, avecun coût d'utilisation réel ; et ce coût ne se voit pas en démo.\nExemple concret :\nUne équipe RH m'a contacté pour construire un \"agent de gestion des demandes\nde congé\". L'idée semblait raisonnable : les employés soumettent des demandes, l'agent\nvérifieles soldes, applique les règles de l'entreprise, valideou refuse.\nOn a passé six semaines à construire l'agent. Gestion du contexte, gestion des\nexceptions, intégration avecle SIRH, gating sur les cas limites. Beau travail.\nTrois mois après le déploiement, le taux d'erreur était de 12%. Un employé sur\nhuit recevait une réponse incorrecte ; mauvais solde calculé, règle mal appliquée, cas\nlimite mal géré.\nLe problème ? La gestion des congés dans cette entreprise suivait des règles\nfixes, documentées, prévisibles. Soixante-dix pour cent des demandes suivaient\nexactement le même schéma. Les trente pour cent restants avaient des exceptions\nconnues et cataloguées.\nCe cas n'avait pas besoin d'un agent. Il avait besoin d'un workflow avec\nquelques conditions et une interface propre. On aurait pu le construire en une semaine.\nIl aurait eu un taux d'erreur proche de zéro.\nCe que j'ai mal évalué, c'est la complexité réelle de la tâche. J'ai confondu\ncomplexité d'implémentation et complexité de décision .\nLa complexité d'implémentation était réelle : intégrer plusieurs systèmes, gérer\ndes cas d'exception, respecter des règles métier.C'est du travail.\nMais la complexité de décision était faible : les règles étaient connues, les cas\ncouverts, les exceptions documentées. Il n'y avait pas de jugement contextuel à exercer.\nAucune adaptation dynamique nécessaire. Aucune information manquante à inférer.\nUn agent excelle quand la décision est complexe ; quand il faut raisonner sur\ndes informations partielles, adapter la réponse au contexte, naviguer dans l'ambiguïté.\nPas quand il faut appliquer des règles déterministes sur des données structurées.\nUtiliser un agent dans le second cas, c'est payer le prix de la flexibilité sans en\ntirer le bénéfice.\nCe prix est plus élevéqu'on ne le croit.\nLe développement d'un agent prend en général trois à cinq fois plus longtemps\nqu'un workflow équivalent.Pas parce que le code est plus complexe ; mais parce que le\ncomportement non déterministe d'un LLM exige des tests d'un autre ordre. On teste des\nchemins, pas des valeurs.On anticipe des dérives,pas des bugs.\nEnsuite vient le monitoring. Un workflow échoue clairement : erreur levée, log\nproduit, alerte déclenchée. Un agent échoue silencieusement. Il répond toujours\nquelque chose. C'est ce quelque chose qui peut être faux, incomplet, ou légèrement\nhors-sujet ; sans que le système ne le détecte.\nEt il y a la maintenance. Les modèles évoluent. Ce qui fonctionnait avec\nGPT-4-turbo se comporte différemment avec la version suivante. Un workflow est\nstable dans le temps. Un agent, non.\n# ? Surcouche agent sur une tâche déterministe def\nprocess_leave_request(request: dict) -> dict: context = build_context(request,\nhr_policies, employee_data) response = llm.generate(context, \"Validate this leave\nrequest\") return parse_response(response) # Non déterministe, fragile # ? Workflow\nsimple et fiable def process_leave_request(request: dict) -> dict: balance =\nget_employee_balance(request[\"employee_id\"]) if balance < request[\"days\"]: return\n{\"status\": \"refused\", \"reason\": \"insufficient_balance\"} if\nconflicts_with_team_schedule(request): return {\"status\": \"pending\", \"reason\":\n\"schedule_conflict\"} return {\"status\": \"approved\"}\nLa version workflow est plus courte, plus lisible, plus testable. Elle ne nécessite\npas de LLM. Et elle ne produira jamais 12% d'erreurs.\nLa vraie question à se poser avant de construire un agent, ce n'est pas \"Est-ce\nque je pourrais faire ça avec un agent ?\" ; la réponse est presque toujours oui. La vraie\nquestion, c'est \"Est-ce que j'ai besoin d'un agent pour faireça ?\"\nCes deux questions n'ont pas les mêmes réponses.\nDans les sections suivantes, on va tracer la frontière précise entre agent,\nworkflow et automation. Et on va construire les critères qui permettent de choisir ; sans\nse laisser piéger par l'enthousiasme.\n[SCHÉMA 1.1] Workflow déterministe vs agent adaptatif ; quand chaque\napproche s'applique\n.2 difference agent vs workflow vs automation\nTrois mots, trois réalités\nOn utilise ces trois termes de façon interchangeable.\nAgent, workflow, automation. Dans les conversations d'équipe, dans les pitchs,\ndans les README des projets. Comme si le mot importait peu ; comme si c'était juste\nune question de branding.\nCe n'est pas juste une question de vocabulaire. Ce sont trois architectures\nfondamentalement différentes,avecdes propriétés, des coûts et des limites radicalement\ndifférentes. Confondre les trois, c'est comme confondre un script shell, une API REST\net un système distribué. Techniquement, les trois \"font des trucs automatiquement\".\nMais on n'en choisit pas un par hasard.\nClarifions une fois pour toutes.\nL'automation : la règle, rien que la règle\nL'automation, c'est simple. Presque bête. Et c'est exactement pourquoi elle est\nefficace.\nUne automation exécute une action déterministe en réponse à un déclencheur\nprédéfini. Pas de raisonnement. Pas d'adaptation. Pas d'ambiguïté tolérée.\nUn nouvel utilisateur crée un compte -> envoyer un email de bienvenue. Une\nfacture dépasse 10 000 EUR -> alerter le responsable financier. Un ticket reste ouvert\ndepuis 48 heures -> escalader au niveau2.\n# ? Automation : déterministe, lisible, testable def on_invoice_received(invoice:\nInvoice): if invoice.amount > 10_000: notify_finance_manager(invoice) else:\nauto_approve(invoice)\nLe comportement est entièrement prévisible. Il n'y a pas de \"peut-être\". Il n'y a\npas d'\"ça dépend du contexte\". La règle s'applique, l'action s'exécute.\nC'est une force, pas une faiblesse. Une automation ne peut pas déraper. Elle ne\npeut pas interpréter une règle différemment selon son humeur. Elle ne rate pas parce\nqu'un modèle a évolué.\nLà où ça pose problème, c'est quand on utilise l'automation pour des cas qui\nnécessitent une lecture contextuelle. La règle est trop rigide. Le cas réel déborde\ntoujours légèrement du cadre prévu. Et l'automation ne sait pas que faire avec ce\ndébordement ; elle l'ignore, ou elle plante.\nLe workflow : l'orchestration sans surprise\nLe workflow va un cran plus loin. C'est une séquence d'étapes prédéfinie,\npotentiellement avec des branches conditionnelles, mais dont le périmètre est connu à\nl'avance.\nLa différenceavecl'automation ? La complexité de l'orchestration. Un workflow\ncoordonne plusieurs étapes, plusieurs systèmes, plusieurs acteurs ; mais le chemin\nglobal est balisé. On sait d'où on part, où on va,et quelles bifurcations sont possibles.\nExemple concret :\nUn workflow de validation de dépenses en entreprise. L'employé soumet une\nnote de frais. Le workflow vérifie si la dépense entre dans le budget prévu. Si oui, il la\ntransfère au manager pour approbation. Si le manager approuve, elle part en\ncomptabilité. Si le montant dépasse 5 000 EUR, elle va d'abord au directeur financier.\nSi quelque chose est manquant ; justificatif absent, catégorie non renseignée ; le\nworkflowrenvoieà l'employé avecun message précis.\n# ? Workflow : orchestration prévisible avec branches connues def\nprocess_expense(expense: Expense) -> WorkflowResult: if not expense.has_receipt():\nreturn request_receipt(expense) if expense.amount > 5_000: approval =\nget_cfo_approval(expense) else: approval = get_manager_approval(expense) if\napproval.granted: return send_to_accounting(expense) else: return\nnotify_rejection(expense, approval.reason)\nToutes les branches sont explicites. Tout le monde peut lire ce code et\ncomprendre exactement ce qui se passe. Les tests sont directs ; on couvre chaque\nbranche, on validechaque sortie.\nCe workflow aurait-il besoin d'un agent ? Non. Les règles sont connues, les cas\nsont couverts, les exceptions sont documentées. Comme l'exemple des congés qu'on a\nvu en 1.1 ; complexité d'implémentation réelle, complexité de décision faible.\nLà où le workflow atteint ses limites, c'est quand les exceptions deviennent\nimprévisibles. Quand les règles ne suffisentplus parce que la réalité déborde le modèle.\nQuand il faut lire entre les lignes.\nL'agent : le raisonnement sous incertitude\nUn agent, c'est différenten nature. Pas seulement en complexité.\nUn agent observe son environnement,raisonne sur ce qu'il perçoit, décide quelle\naction prendre, l'exécute, observe le résultat, et recommence. C'est la boucle Reason ->\nAct que le pattern ReAct formalise. Ce qui distingue un agent d'un workflow,c'est cette\ncapacité d'adaptation à l'imprévu.\nUn workflowsuit un chemin. Un agent choisit son chemin à chaque étape.\n[SCHÉMA 1.1] Comparaison : automation (trigger -> action), workflow (étapes\nbalisées), agent (boucle Reason -> Act avecadaptation dynamique)\nExemple concret :\nUn agent de tri de tickets support. Chaque ticket est différent ; formulation\nvague,problème multi-facettes, contexte utilisateur variable.L'agent doit comprendre la\ndemande même quand elle est mal exprimée, identifier la catégorie pertinente parmi\ndes dizaines de possibilités, décider si le ticket nécessite une escalade immédiate ou\npeut suivrela file standard, et parfois poser une question de clarification avantd'agir.\n# ? Agent : raisonnement contextuel sur un problème non déterministe def\ntriage_ticket(ticket: Ticket, tools: ToolSet) -> TriageResult: # L'agent observe le\ncontexte context = build_context(ticket, tools.get_user_history(ticket.user_id)) # Il\nraisonne (ReAct : Reason -> Act -> Observe -> Repeat) while not\nis_decision_final(context): reasoning = llm.reason(context) action =\nllm.decide_action(reasoning, tools.available_actions()) result = tools.execute(action)\ncontext = update_context(context,action, result) return context.final_decision\nCe que fait l'agent ici n'aurait pas pu être scripté à l'avance. La diversité des\ntickets, la formulation imprévisible, la nécessité de croiser plusieurs informations avant\nde trancher ; c'est précisément là qu'un workflowdéterministe aurait craqué.\nChoisir, c'est éliminer\nEn pratique, la question n'est pas \"agent ou workflow?\" mais \"quel est le niveau\nde décision contextuelle requis ?\"\nSi la réponse est \"aucun ; les règles couvrent tous les cas\", c'est une automation.\nSi la réponse est \"les étapes sont connues, mais il faut orchestrer plusieurs\nsystèmes et gérer des branches\", c'est un workflow.\nSi la réponse est \"les cas débordent toujours légèrement du cadre, et il faut\nraisonner sur l'ambiguïté\", c'est ; peut-être ; un agent.\n[TABLEAU 1.1] Grille de sélection : Automation / Workflow / Agent selon\ncritères (prévisibilité des règles, adaptabilité requise, coût d'erreur, complexité\nd'orchestration)\nLe \"peut-être\" est important. Parce qu'un agent coûte. En développement, en\nmonitoring, en maintenance. On n'y vient que quand les deux autres options ont montré\nleurs limites.\nCe qu'on ne fait pas : on ne commence pas par l'agent parce que c'est \"plus\nimpressionnant\". On commence par l'automation, on monte vers le workflow si\nnécessaire, et on n'arrive à l'agent que si le problème l'exige vraiment. L'architecture\nsuit le problème ; pas l'inverse.\nDans la section suivante, on traduit ça en signaux concrets. Pas de la théorie ;\ndes critères observables,directement applicables à ton prochain projet.\n.3 signaux agent mauvaise idee\nLes signaux qui ne trompent pas\nDans la section précédente, on a clarifié les définitions : automation, workflow,\nagent. Troisarchitectures, trois niveauxde complexité de décision.\nMais une définition ne suffit pas pour décider.Ce qu'il faut, ce sont des signaux\nconcrets ; des indicateurs observables dès la phase de design, avant d'avoir écrit une\nseule ligne de code.\nJ'en ai identifié quatre. Chacun, pris seul, devrait te faire hésiter. Deux ou plus\nensemble, c'est un signal d'alarme.\nSignal 1 : le workflow est linéaire et prévisible\nLa première question à poser sur n'importe quelle tâche : est-ce que le chemin\nest toujours le même ?\nPas \"est-ce que c'est compliqué ?\" Pas \"est-ce que ça implique plusieurs\nsystèmes ?\" La question est : les étapes se suivent-elles dans un ordre prédéfini, sans\nbifurcations inattendues ?\nSi tu peux dessiner le workflow sur un tableau blanc ; avec des boîtes et des\nflèches ; et que ce schéma couvre 95% des cas réels, tu n'as pas besoin d'un agent. Tu\nas besoin d'un workflow.\nUn agent excelle dans l'imprévisibilité. C'est son domaine. Il raisonne sur des\nsituations qu'on n'a pas anticipées, navigue dans l'ambiguïté, adapte son chemin à\nmesure que l'information arrive. Si la tâche ne requiert rien de tout ça, payer le prix de\ncette flexibilité est un gaspillage pur.\nJ'ai vu une équipe produit construire un \"agent de gestion de releases\" pendant\ntrois mois. Déployer en staging, vérifier les métriques, notifier Slack, créer le tag Git,\nmettre à jour Jira. Cinq étapes. Toujoursdans le même ordre. Jamais d'exception.\nC'est un pipeline de CI/CD. Pas un agent.\nSignal 2 : les décisions peuvent être scriptées\nDeuxième question : si on donnait la liste des règles métier à un stagiaire,\npourrait-il prendre les mêmes décisions que l'agent ?\nCe n'est pas une question sur l'intelligence. C'est une question sur la nature des\ndécisions. Si les règles sont explicites, documentées, et couvrent les cas réels ; la\ndécision est scriptable. Et ce qui est scriptable n'a pas besoin d'un LLM pour être pris.\n# ? Agent sur une décision déterministe def approve_expense(expense: dict) ->\nbool: context = build_context(expense, policies, history) response = llm.generate(\nf\"Analyse cette note de frais et dis si elle doit être approuvée: {context}\" ) return\nparse_approval(response) # ? Règles explicites ; lisibles, testables, déterministes def\napprove_expense(expense: dict) -> bool: if not expense.get(\"receipt\"): return False if\nexpense[\"amount\"] > 5000: return requires_cfo_approval(expense) if\nexpense[\"category\"] not in ALLOWED_CATEGORIES: return False return\nexpense[\"amount\"] <= budget_remaining(expense[\"employee_id\"])\nLa version agent coûte plus cher à faire tourner, elle peut produire des résultats\ninconsistants selon la formulation de la note de frais, et elle est impossible à tester\nunitairement de façon fiable. La version règles est testable, auditable, et se comporte de\nfaçon identique à chaque exécution.\nQuand les règles métier sont claires et stables, les encoder explicitement est\ntoujours préférable à les laisser inférer à un modèle.\nSignal 3 : aucune adaptation contextuelle n'est nécessaire\nTroisième signal : est-ce que la réponse correcte change selon le contexte\nutilisateur, l'historique, la situation particulière ; ou est-ce que la même input donne\ntoujours la même output ?\nC'est la question qui distingue l'agent du workflow le plus clairement. Un agent\njustifie son existence quand deux demandes identiques en surface nécessitent des\nréponses différentes selon le contexte. Un ticket support qui dit \"je ne peux pas me\nconnecter\" mérite des réponses différentes selon que l'utilisateur a un compte actif,\nvient de changer son mot de passe, ou accède depuis un nouveau pays.\nSi la tâche n'a pas besoin de lire ce contexte pour décider ; si la réponse est la\nmême quelle que soit la situation particulière de l'utilisateur ; un workflowsuffit.\nSignal 4 : le coût de l'erreur est élevé\nCe signal est différent des trois précédents. Il ne dit pas \"tu n'as pas besoin d'un\nagent\". Il dit : \"si tu utilises un agent ici, sois extrêmement prudent ; et probablement,\ntu ne devraispas.\"\nLes agents se trompent. Pas tout le temps, pas de façon catastrophique en\ngénéral ; mais ils se trompent. C'est inhérent au non-déterminisme des LLMs. Une\nreformulation légèrement différente peut produire une décision différente. Un passage\nde la base de connaissance mal récupéré peut orienter le raisonnement dans la mauvaise\ndirection.\nDans des domaines où l'erreur est réversible et peu coûteuse, c'est acceptable.\nDans des domaines critiques, c'est une dette que tu ne veux pas contracter.\nExemple concret :\nUn client dans le secteur juridique voulait automatiser la validation de clauses\ncontractuelles. L'idée : un agent lit les contrats soumis par les RH, identifie les clauses\nproblématiques, et valideou rejette.\nL'agent fonctionnait bien sur les cas types. Il identifiait correctement les clauses\nde non-concurrence abusives, les périodes d'essai illégales, les mentions obligatoires\nmanquantes.\nMais il avaitun taux d'erreur de 8% sur les cas atypiques. Pas énorme. Sauf que\ndans ce contexte, 8% d'erreur sur des contrats de travail ; c'est une clause illégale\npassée, un licenciement mal documenté, une exposition légale pour l'entreprise.\nOn a changé l'approche. L'agent n'est plus le validateur ; il est l'assistant. Il\nanalyse le contrat, produit une liste de points d'attention, et soumet cette liste à un\njuriste pour validation finale. Le juriste prend la décision. L'agent réduit son temps de\ntravailde 70%.\nC'est la bonne architecture pour les domaines critiques : l'agent accélère,\nl'humain décide.\n[SCHÉMA 1.2] Continuum de risque : de l'automatisation complète à la\nvalidationhumaine obligatoire\nUtiliser ces signaux en pratique\nCes quatre signaux ne sont pas des règles absolues. Ils sont des questions à\nposer avantde commencer.\nQuand tu évaluesun nouveau use case, passe-les en revue:\nLe workflow est-il linéaire ? Les décisions sont-elles scriptables ? L'adaptation\ncontextuelle est-elle nécessaire ? Le coût de l'erreur est-il élevé?\nSi tu réponses \"oui, non, non, oui\" ; tu as probablement un cas pour un\nworkflowrobuste avecquelques règles métier bien encodées, pas un agent.\n# Grille de décision rapide ; à adapter à ton contexte def needs_agent(task: dict)\n-> bool: # Signal 1 : workflow linéaire if task[\"flow_is_linear\"] and\ntask[\"steps_are_fixed\"]: return False # Signal 2 : décisions scriptables if\ntask[\"decisions_are_rule_based\"] and task[\"rules_are_documented\"]: return False #\nSignal 3 : pas d'adaptation contextuelle if not task[\"requires_contextual_adaptation\"]:\nreturn False # Signal 4 : coût d'erreur élevé sans supervision if task[\"error_cost\"] ==\n\"high\" and not task[\"has_human_in_loop\"]: return False # pas \"pas d'agent\", mais \"pas\nsans supervision\" # Si aucun de ces signaux ne disqualifie -> agent potentiellement\njustifié return True\nCe code est délibérément simple. Ce n'est pas une implémentation ; c'est une\nchecklist encodée. L'idée, c'est de forcer la conversation sur ces questions avant de se\nlancer.\nLa bonne question n'est pas \"est-ce qu'on peut faire ça avec un agent ?\" On peut\npresque tout faire avecun agent. La bonne question, c'est \"est-ce qu'on doit ?\"\nLa réponse, souvent, est non.\nDans la section suivante, on regarde ce que ça coûte vraiment quand on dit oui\nsans avoirposé ces questions.\n.4 cout cache autonomie\nCe que tu vois, et ce que tu ne vois pas\nLe premier devisd'un agent est toujours trop optimiste.\nDeux semaines de développement, disent-ils. Un sprint et demi. On intègre\nl'API, on écrit quelques prompts, on déploie. Simple.\nCe n'est pas un mensonge. C'est juste incomplet.\nLe problème avec les agents, c'est que leur vrai coût n'apparaît pas dans la PR\ninitiale. Il émerge progressivement, en production, sous forme de petites dettes qui\ns'accumulent. Chaque erreur inexpliquée, chaque comportement inattendu, chaque mise\nà jour de modèle qui casse subtilement quelque chose ; tout ça a un prix. Et ce prix, on\nne l'a pas calculé au départ.\nJ'ai appris ça à mes dépens. Pas une fois. Plusieurs.\nLe développement : la partie visible de l'iceberg\nConstruire un agent correctement prend en moyenne trois à cinq fois plus\nlongtemps qu'un workflow équivalent. Pas parce que le code est plus complexe. Parce\nque le comportement non déterministe d'un LLM change fondamentalement ce que\n\"tester\" veut dire.\nDans un workflow,on teste des valeurs. assert result == expected. Pass ou fail.\nSimple.\nDans un agent, on teste des comportements. Est-ce que le raisonnement est\ncohérent sur 50 variantes de la même requête ? Est-ce que l'agent ne se bloque pas\nquand un outil renvoie une réponse malformée ? Est-ce qu'il maintient le bon fil\ndirecteur sur dix étapes consécutives?\nCes questions n'ont pas de réponse binaire. Elles demandent des jeux de\ndonnées d'évaluation,des runs répétés, de l'analyse manuelle.\nExemple concret :\nUne startup m'a contacté pour déboguer un agent de qualification de leads\ncommerciaux. L'agent interrogeait le CRM, analysait le profil de l'entreprise, et\ncatégorisait les prospects en trois niveauxde priorité.\nIls avaient estimé le développement à deux semaines. Il avait pris six. Pas à\ncause d'imprévus techniques. Parce qu'ils avaient découvert en cours de route que\nl'agent produisait des catégorisations inconsistantes sur des profils similaires. Le même\nlead soumis deux fois avec un libellé légèrement différent recevait parfois une priorité\ndifférente.\nCorriger ça a demandé de construire un jeu d'évaluation de cent cas, de faire\ntourner l'agent en boucle, et d'itérer sur les prompts jusqu'à atteindre une cohérence\nacceptable. Ce n'était pas du développement. C'était du travail éditorial sur le\ncomportement du modèle.\nUn workflow de qualification avec des règles explicites aurait pris dix jours. Et\nil aurait produit exactement le même résultat sur le même input, à chaque fois.\nLe monitoring : le coût qui ne s'arrête jamais\nUn workflow échoue clairement. Exception levée. Log produit. Alerte\ndéclenchée. L'erreur est visible, localisable, reproductible.\nUn agent échoue silencieusement.\nIl répond toujours quelque chose. Mais ce quelque chose peut être faux,\nincomplet, légèrement hors-sujet ; sans que le système ne le détecte. Pas de stack trace.\nPas d'alerte. Juste une mauvaisedécision qui passe à travers.\nC'est ce que j'appelle l' échec silencieux . Et c'est ce qui rend le monitoring d'un\nagent radicalement plus coûteux que celui d'un workflow.\nPour monitorer un agent correctement, il faut :\n; Logger non seulement les outputs, mais le raisonnement (pourquoi l'agent a\npris cette décision) ; Construire des métriques sur la qualité des décisions, pas\nseulement sur la disponibilité du service ; Faire de l'évaluation en continu sur un\néchantillon des décisions prises ; Détecter les dérives comportementales avant qu'elles\nimpactent les utilisateurs\n# ? Monitoring minimal ; ne voit que les crashes def agent_decide(context: dict)\n-> dict: result = agent.run(context) logger.info(f\"Agent responded: {result['output']}\")\nreturn result # ? Monitoring complet ; capture les décisions et leur justification def\nagent_decide(context: dict) -> dict: result = agent.run(context) decision_log = {\n\"input_hash\": hash(str(context)), \"decision\": result[\"output\"], \"reasoning\":\nresult.get(\"reasoning\", \"\"), \"confidence\": result.get(\"confidence\"), \"tools_called\":\nresult.get(\"tool_calls\", []), \"timestamp\": datetime.now().isoformat(), }\ndecision_store.append(decision_log) metrics.record_decision(decision_log) return\nresult\nCe logging structuré est indispensable. Sans lui, on ne peut pas détecter qu'un\nagent dérive, ni comprendre pourquoi il a pris une mauvaise décision trois semaines\nplus tard.\nLa maintenance : le coût du temps\nLes modèles évoluent. GPT-4-turbo se comporte différemment de GPT-4o.\nClaude 3 Opus et Claude 3.5 Sonnet ne répondent pas aux mêmes prompts de la même\nfaçon. Et quand un provider déploie une nouvelle version ; parfois sans te prévenir; ton\nagent peut subtilement changer de comportement sans que rien ne plante.\nC'est ce que j'appelle le drift de modèle . Et c'est une source de coût de\nmaintenance qui n'existe pas avecun workflow.\nUn workflow qu'on a écrit en 2022 tourne en 2026 exactement pareil. Il n'y a\npas de modèle sous-jacent qui évolue.Les règles sont les règles.\nUn agent demande des tests de régression après chaque changement de modèle.\nDes passes de vérification après chaque mise à jour de dépendances. Un suivi de la\nroadmap des providers pour anticiper les changements.\n[TABLEAU1.2] TCO comparatif : workflowvs agent sur 12 mois\nCalculer avant de construire\nVoici une estimation réaliste du TCO d'un agent simple sur douze mois,\ncomparé à un workflowéquivalent:\n# Estimation TCO ; agent vs workflow (en jours-ingénieur) tco = { \"workflow\":\n{ \"développement\": 10, # dev initial \"tests\": 3, # tests déterministes \"déploiement\": 1,\n\"monitoring\": 2, # alertes standard + logs \"maintenance_12m\": 4, # corrections de\nbugs, évolutions \"total\": 20, }, \"agent\": { \"développement\": 25, # dev + prompt\nengineering + eval\"tests\": 10, # tests comportementaux, jeux d'eval\"déploiement\": 3, #\nstaging, tests de charge \"monitoring\": 15, # dashboards décisions, analyses drift\n\"maintenance_12m\": 20, # drift modèle, évolutions de comportement \"total\": 73, } }\nratio = tco[\"agent\"][\"total\"] / tco[\"workflow\"][\"total\"] # -> 3.65x plus coûteux sur 12\nmois\nCe ratio de 3,5x à 4x est cohérent avec ce que j'ai observé sur le terrain. Et il ne\ntient pas compte des coûts d'inférence ; les appels LLM coûtent plusieurs ordres de\ngrandeur plus cher que l'exécutiond'un workflowPython.\nPour un cas où un workflowsuffit,ce surcoût est pur gaspillage. Tupaies le prix\nde la flexibilité d'un agent sans en avoirbesoin.\nLa question à poser avant de commencer n'est pas \"est-ce qu'on peut construire\nça comme un agent ?\" Elle est : \"est-ce que la valeur ajoutée de l'agent justifie un TCO\nquatre fois plus élevé?\"\nSouvent, la réponse est non.\nDans la section suivante, on traduit tout ça en une règle simple ; le critère\nunique qui permet de trancher.\n.5 regle complexite decision\nUne règle. Une seule.\nOn a identifié les signaux. On a calculé le coût. On a vu les patterns d'échec.\nMaintenant j'ai besoin de quelque chose de simple. Une règle que je peux\nappliquer en dix secondes avant de ouvrir un éditeur. Une question qui coupe court à\ntous les débats d'équipe sur \"est-ce qu'on devraitutiliser un agent pour ça ?\".\nLa voilà :\nUtilise un agent si et seulement si la complexité de décision dépasse la\ncomplexité d'exécution.\nC'est tout.\nSi l'aspect le plus difficile de ta tâche est de savoir quoi faire ; raisonner sur un\ncontexte ambigu, inférer des informations manquantes, adapter la réponse à l'imprévu ;\nalors un agent est justifié.\nSi l'aspect le plus difficile est de faire ; orchestrer des appels API, transformer\ndes données, coordonner des systèmes ; tu as besoin d'un workflow.Pas d'un agent.\nPourquoi cette règle fonctionne\nElle tranche parce qu'elle pointe vers la bonne dimension.\nOn se trompe souvent parce qu'on confond la complexité apparente d'une tâche\navec la complexité de la décision qu'elle requiert. Une tâche peut être techniquement\ncomplexe ; beaucoup d'intégrations, beaucoup de cas, beaucoup de données ; et\npourtant ne requérir aucun jugement contextuel réel.\nC'est exactement ce qu'on a vu en 1.1 avec l'agent de gestion des congés. La\ntâche avait une vraie complexité d'exécution : intégrations SIRH, gestion des cas\nd'exception, règles métier nombreuses. Mais la complexité de décision était quasi nulle\n: les règles étaient documentées, les cas couverts, les exceptions cataloguées. Aucun\njugement à exercer.Aucune ambiguïté à résoudre.\nRésultat : un agent avec 12% de taux d'erreur là où un workflow aurait produit\n0%.\nLa règle :\nComplexité de décision > Complexité d'exécution -> Agent Complexité de\ndécision <= Complexité d'exécution-> Workflowou Automation\nMesurer la complexité de décision\nLa règle est simple. L'appliquer demande un peu de pratique.\nVoici les questions concrètes à poser pour estimer la complexité de décision\nd'une tâche :\n1. L'entrée est-elle ambiguë ? Est-ce que l'agent va recevoir des inputs qui\nvarient de façon imprévisible ; formulations différentes, informations manquantes,\ncontexte variabled'un utilisateur à l'autre ? Si oui, il y a de la complexité de décision.\n2. Les règles sont-elles explicites ? Peut-on écrire les règles de décision dans\nun document et couvrir 95% des cas ? Si oui, la complexité de décision est faible. Si les\nrègles sont floues, contradictoires, ou dépendent d'un \"jugement\" humain difficile à\nformaliser,la complexité de décision est élevée.\n3. L'adaptation contextuelle est-elle nécessaire ? La réponse correcte\nchange-t-elle significativementselon qui pose la question, dans quel contexte, avecquel\nhistorique ? Un agent de support qui répond à un utilisateur premium différemment\nd'un utilisateur standard, en tenant compte de l'historique de ses tickets et de la\ncomplexité de son problème ; c'est de l'adaptation contextuelle réelle.\n4. L'imprévu est-il fréquent ? Quelle proportion des cas réels tombe en dehors\ndes scénarios prévus au design ? Si moins de 5%, un workflow avec quelques branches\nd'exception suffit.Si plus de 20%, la tâche requiert un raisonnement adaptatif.\nExemple concret :\nJ'ai évaluédeux projets en parallèle pour un client e-commerce.\nProjet A : Un agent pour gérer les retours clients. Le client envoie un email,\nl'agent détermine si le retour est éligible selon la politique retour, et génère une\nétiquette ou un refus.\nProjet B : Un agent pour répondre aux questions produit des clients. Le client\npose une question sur un produit, l'agent cherche dans le catalogue, comprend la\nquestion souvent imprécise, et fournit une réponse adaptée au contexte d'usage du\nclient.\nPour le Projet A, j'ai posé les quatre questions. L'entrée est structurée\n(commande + motif de retour). Les règles sont explicites (politique retour en 12\npoints). L'adaptation contextuelle est limitée (cas standard ou cas exceptionnel escaladé\nà un humain). L'imprévu est rare (moins de 5% des retours sortent du cadre). Verdict:\nworkflow.\nPour le Projet B, même exercice. L'entrée est libre et souvent vague (\"est-ce que\nce truc convient pour un enfant de 6 ans ?\"). Les règles ne s'appliquent pas ; il faut\ncomprendre l'usage implicite et la fiche produit. L'adaptation contextuelle est\nessentielle ; la réponse change selon l'âge de l'enfant, l'usage prévu, les contraintes de\nsécurité. L'imprévuest la norme (chaque question est unique). Verdict: agent.\nOn a construit un workflow pour les retours. Délai de développement : huit\njours. Tauxd'erreur : inférieur à 1%.\nOn a construit un agent pour les questions produit. Délai de développement :\nquatre semaines. Satisfaction client sur les réponses : +34% comparé à la FAQstatique\nprécédente.\nLe bon outil pour le bon problème.\nLa grille de décision\nPour rendre cette règle applicable immédiatement, voici la grille synthétique de\nla Partie 1.\n[TABLEAU1.3] Grille de décision : automation, workflowou agent ?\ndef choose_architecture(task: dict) -> str: \"\"\" Grille de décision simplifiée. task\n= { \"input_ambiguity\": 0-3, # 0 = structuré, 3 = très ambigu \"rules_explicit\":\nTrue/False, # règles documentées ? \"contextual_adaptation\": 0-3, # 0 = aucune, 3 =\nforte \"unexpected_rate\": float, # % de cas hors-scénario \"error_cost\": \"low\"/\"high\", #\nimpact d'une erreur } \"\"\" decision_complexity = ( task[\"input_ambiguity\"] + (0 if\ntask[\"rules_explicit\"] else 3) + task[\"contextual_adaptation\"] +\n(task[\"unexpected_rate\"] * 10) ) if decision_complexity < 3: return \"automation\" if\ndecision_complexity < 6: if task[\"error_cost\"] == \"high\": return\n\"workflow_with_human_validation\"return \"workflow\" # Haute complexité de décision\nif task[\"error_cost\"] == \"high\": return \"agent_with_heavy_gating\"return \"agent\"\nCe n'est pas un algorithme de production. C'est une aide à la réflexion. L'utiliser\ncomme checklist mentale avantchaque décision architecture est suffisant.\nCe que tu emportes de cette partie\nLa Partie 1 t'a donné un cadre complet pour répondre à la première question\nd'architecture : est-ce que j'ai besoin d'un agent ?\nRappel rapide :\n; L'agent n'est pas le marteau universel. Le réflexe est normal ; le corriger est\nnécessaire. ; Automation, workflow, agent ne sont pas des synonymes. L'architecture\nsuit le problème. ; Quatre signaux révèlent qu'un agent est la mauvaise réponse avant\nmême d'écrire une ligne de code. ; Le TCO d'un agent est 3,5x à 4x supérieur à un\nworkflow équivalent ; payable seulement si la valeur ajoutée le justifie. ; La règle de\ndécision : complexité de décision > complexité d'exécution.\nSi tu as passé cette grille et conclu que tu as besoin d'un agent ; bienvenuedans\nla suite.\nParce que construire un agent, c'est seulement le début du problème.\nLe réflexe suivant qu'on a presque tous eu : donner à l'agent le maximum\nd'autonomie dès le début. Laisser le modèle décider.Faire confiance au raisonnement.\nC'est un piège. Et c'est ce qu'on vadéconstruire dans la Partie 2.\n"
  },
