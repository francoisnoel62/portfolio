    "title": "Chapitre 2 - Pourquoi autonome est un piège",
    "md": "# Chapitre 2 - Pourquoi autonome est un piège\n\nPourquoi \"autonome\" est un piège\nLa promesse est séduisante.\nTu déploies l'agent, tu t'en vas, et le système travaille pendant que tu dors. Pas\nd'intervention humaine. Pas de goulot d'étranglement. L'agent règle les tickets, répond\naux demandes, prend les décisions ; tout seul.\nC'est le fantasme du \"set and forget\". Et c'est précisément ce fantasme qui fait\ncrasher des agents en production.\nL'attrait de l'autonomie\nJe comprends l'attraction. On construit un agent pour automatiser.Si l'agent doit\nquand même solliciter un humain à chaque étape, quel est l'intérêt ? On aurait pu se\ncontenter d'un formulaire.\nC'est le raisonnement que j'entends régulièrement. Et il n'est pas faux en soi.\nLe problème, c'est le timing. L'autonomie complète est une destination, pas un\npoint de départ. La confondre avecun prérequis, c'est mettre la charrue avantles b?ufs ;\net regarder l'ensemble partir dans le décor.\nCe qui se passe vraiment\nUn agent autonome prématuré fait des erreurs. Ce n'est pas une hypothèse, c'est\nune constante.\nExemple concret : J'ai déployé un agent de support client avec une autonomie\ncomplète sur les remboursements. L'intention était claire : traiter les demandes simples\nsans intervention humaine, réduire le délai de réponse de 48h à quelques minutes.\nLe premier mois, les métriques semblaient bonnes. Temps de résolution en\nbaisse, satisfaction en hausse. L'agent créait des remboursements, envoyait des\nconfirmations, clôturait les tickets.\nPuis l'équipe finance a fait un audit.\nL'agent avait remboursé des commandes annulées depuis 6 mois. Il avait\nappliqué la politique de remboursement standard à des cas qui relevaient d'une\nprocédure d'exception. Il avaitinventéune procédure de geste commercial qui n'existait\npas dans nos règles, parce qu'il avaitinterpolé un pattern à partir de cas similaires.\nLe total des remboursements non justifiés : quelques milliers d'euros. Pas\ncatastrophique. Mais suffisant pour créer une crise de confiance interne et forcer un\nrollback complet.\nL'agent n'avait pas mal fonctionné au sens technique. Il avait fait exactement ce\npour quoi il était construit : résoudre des demandes de remboursement en autonomie.\nLe problème, c'est qu'on lui avait donné cette autonomie avant d'avoir vérifié qu'il\npouvaitl'exercercorrectement.\nLe paradoxe de l'autonomie\nVoilàce que les démos ne montrent jamais.\nEn démo, l'environnement est contrôlé. Les cas sont choisis pour illustrer les\ncapacités de l'agent. Les arêtes vives ; les cas limites, les exceptions, les situations\nambiguës ; ont été soigneusement évitées.\nEn production, c'est l'inverse. Les utilisateurs arrivent avec leurs cas tordus,\nleurs demandes incomplètes, leurs contextes particuliers. Et l'agent, qui n'a jamais vu\nces cas en test, improvise.\nLa plupart du temps, l'improvisation est raisonnable. Parfois, elle ne l'est pas. Et\nsans supervision, personne ne le sait ; jusqu'à ce que les conséquences remontent.\nC'est le paradoxe central : pour être digne d'autonomie, un agent doit\nd'abord être contrôlé. L'autonomie ne précède pas la fiabilité. Elle en est la\nrécompense.\n# ? Autonomie immédiate ; l'agent décide et exécute sans garde-fou def\nhandle_refund_request(ticket): decision = agent.analyze(ticket) if\ndecision.should_refund: process_refund(decision.amount) # Exécution directe\nclose_ticket(ticket) # ? Autonomie progressive ; supervision avant exécution complète\ndef handle_refund_request(ticket): decision = agent.analyze(ticket) if decision.amount\n> AUTONOMOUS_THRESHOLD or decision.is_exception: return\nqueue_for_human_review(ticket, decision) # Gating process_refund(decision.amount)\nclose_ticket(ticket)\nLa différence n'est pas dans la qualité de l'analyse ; c'est la même. La\ndifférence, c'est qu'on n'a pas encore la preuve que l'agent gère correctement tous les\ncas. Alors on gère les cas à risque différemment.\nCe que ça coûte de ne pas comprendre ça\nLes conséquences d'une autonomie prématurée sont rarement catastrophiques au\nsens fort. L'agent ne va pas supprimer des bases de données ou envoyer des emails à\ntoute l'entreprise (sauf si tu lui as donné accès à ces outils).\nCe sont des coûts plus insidieux : des décisions incorrectes qui passent\ninaperçues pendant des semaines, une érosion lente de la confiance des utilisateurs, des\nincohérences qui s'accumulent dans les données.\nEt quand tout ça remonte, la réaction instinctive est de blâmer le modèle.\n\"GPT-4 n'est pas assez intelligent.\" \"Il faut passer à Claude.\" \"Les LLMs ne sont pas\nprêts pour ça.\"\nCe n'est presque jamais le bon diagnostic. Le modèle a généralement fait ce\nqu'on lui a demandé de faire. Le problème, c'est qu'on lui a demandé de décider seul\ndans des situations où il aurait fallu un filet de sécurité.\nL'autonomie est un niveau de confiance. Et comme toute confiance, elle se\ngagne.\nLa question n'est donc pas \"comment rendre mon agent autonome ?\" mais\n\"comment construire un système qui gagne progressivement le droit à l'autonomie ?\"\nC'est un changement de perspectivequi change tout ce qui suit.\n.2 lautonomie comme phase finale\nL'autonomie comme phase finale\nAlors, comment on construit un système qui gagne progressivement le droit à\nl'autonomie ?\nPas en espérant que l'agent \"apprenne\" avec le temps. Pas en croisant les doigts.\nAvec un modèle de déploiement en trois phases, des critères objectifs pour passer de\nl'une à l'autre, et la discipline de ne pas sauter des étapes.\nC'est le seul chemin qui fonctionne.\nLes trois phases\n[SCHÉMA 2.1] Les 3 niveaux: Assisté -> Supervisé -> Autonome\nPhase 1 ; Assisté. L'agent propose. L'humain décide et exécute.\nL'agent analyse, raisonne, formule une recommandation. Mais c'est un humain\nqui approuve et qui déclenche l'action. L'agent n'a aucun accès direct aux systèmes en\nproduction.\nC'est la phase que personne ne veut, parce qu'elle ressemble à beaucoup de\ntravail pour peu d'automatisation. Et pourtant, c'est là que tout se joue. C'est ici qu'on\nobserve comment l'agent raisonne sur les vrais cas, avec les vrais utilisateurs. C'est là\nqu'on identifie les erreurs avantqu'elles aient des conséquences.\nPhase 2 ; Supervisé. L'agent exécute.L'humain valideles décisions critiques.\nL'agent peut maintenant agir directement sur les systèmes, mais seulement dans\nun périmètre délimité. Les décisions simples passent en automatique. Les décisions\nau-delà d'un certain seuil ; financier, légal, irréversible ; requièrent une validation\nhumaine explicite avantexécution.\nC'est le fonctionnement courant de la plupart des agents en production qui\ntiennent la durée. Pas parce qu'on n'a pas confiance dans le modèle, mais parce qu'on a\nune visibilité claire sur ce qu'on a validéet ce qu'on n'a pas encore validé.\nPhase 3 ; Autonome.L'agent décide et exécute.L'humain supervise à distance.\nL'agent opère en pleine autonomie sur son périmètre. Les humains vérifient les\nmétriques, examinent les cas flaggés par le monitoring, interviennent en cas d'anomalie.\nLa supervision est là, mais elle n'est plus dans la boucle de chaque décision.\nCette phase se mérite. Elle arrive quand on a les données qui la justifient ; pas\nquand on est fatigué de superviser.\nL'exemple de l'agent de customer support\nJ'ai vu cette progression dans un contexte de support client B2B. Au départ,\nl'agent traitait des demandes de remboursement.\nEn phase assistée, pendant les six premières semaines, il analysait chaque ticket\net générait une recommandation structurée : type de remboursement, montant suggéré,\njustification. Les agents humains lisaient la recommandation, vérifiaient, et\ndéclenchaient le remboursement eux-mêmes. Sur 300 tickets traités, l'équipe a relevé\n23 recommandations problématiques ; des cas de fraude que l'agent n'avait pas\nidentifiés, des exceptions à la politique qu'il ne connaissait pas.\nCes 23 cas ont nourri une mise à jour du prompt système et une clarification des\nrègles. Deux semaines de plus en phase assistée. Zéro recommandation problématique\nsur les 200 suivants.\nEn phase supervisée, l'agent a commencé à traiter directement les\nremboursements inférieurs à 50EUR sur des demandes standards. Les cas complexes\nremontaient toujours pour validation. Pendant deux mois, un humain jetait un ?il aux\ncas automatiquement traités une fois par jour.Tauxd'erreur : moins de 0,5%.\nLa phase autonome est arrivée au mois cinq, sur ce périmètre restreint. L'agent\ntraitait seul les cas simples. Le monitoring alertait en cas d'anomalie. L'équipe\nn'intervenait plus que sur les cas flaggés ; environ3% du volume.\nCinq mois. Pas cinq jours.\nCe qu'on mesure pour passer d'une phase à l'autre\nÇa ne se fait pas au feeling. La progression doit être basée sur des métriques,\npas sur une impression.\nLes critères que j'utilise :\nPour passer de Assisté à Supervisé : taux de recommandations validées sans\nmodification supérieur à 90% sur au moins 100 décisions. Zéro erreur critique non\ndétectée sur la période.\nPour passer de Supervisé à Autonome : taux de décisions correctes supérieur à\n95% sur le périmètre délimité, sur au moins 200 décisions. Zéro décision erronée ayant\nnécessité un rollback complexe.Système de monitoring opérationnel et testé.\nCes seuils ne sont pas universels. Ils varient selon le domaine, le coût de\nl'erreur, le volume. Un agent qui prend des décisions financières importantes aura des\nseuils plus stricts. Un agent de tri de tickets internes sera moins critique.\nMais le principe est le même : la progression repose sur des données, pas sur\nla confiance.\n# ? Progression arbitraire ; \"on a l'impression que ça marche\" def\nshould_promote_to_autonomous(agent): return True # On est impatient # ? Progression\nbasée sur des métriques def should_promote_to_supervised(metrics): return (\nmetrics.recommendation_acceptance_rate >= 0.90 and metrics.total_decisions >= 100\nand metrics.critical_errors == 0 ) def should_promote_to_autonomous(metrics): return (\nmetrics.correct_decision_rate >= 0.95 and metrics.total_decisions >= 200 and\nmetrics.rollbacks_requiring_manual_fix == 0 and metrics.monitoring_system_validated\n== True)\nLe retour en arrière est une fonctionnalité\nUn détail qu'on oublie presque toujours : la progression doit aussi fonctionner\ndans l'autre sens.\nUn agent en phase Supervisé qui commence à montrer des signes de drift doit\npouvoir revenir en phase Assistée automatiquement. Un agent autonome dont les\nmétriques se dégradent doit repasser en Supervisé le temps d'identifier la cause.\nCe n'est pas un échec. C'est de la résilience.\nLe drift comportemental ; un changement non désiré du comportement de\nl'agent après une mise à jour du modèle ou un changement des données ; est une réalité\nen production. Si le système ne peut pas rétrograder d'un niveau en cas d'anomalie, on\nn'a pas un système robuste, on a une bombe à retardement.\ndef check_and_adjust_autonomy_level(agent, metrics): current_level =\nagent.autonomy_level if current_level == \"autonomous\": if\nmetrics.correct_decision_rate < 0.90: agent.autonomy_level = \"supervised\"\nalert_team(\"Agent rétroclassé : Autonome -> Supervisé\") if current_level ==\n\"supervised\": if metrics.correct_decision_rate < 0.80: agent.autonomy_level =\n\"assisted\" alert_team(\"Agent rétroclassé : Supervisé -> Assisté\")\nLe vrai livrable de cette partie\nÀ la fin de la Partie 2, le livrable n'est pas \"un agent autonome\". C'est un\nmodèle de déploiement en trois niveaux, avec des seuils clairs pour progresser et\nrégresser selon les données.\nC'est moins spectaculaire qu'une démo impressionnante. Et c'est exactement\npourquoi ça tient en production.\nMaintenant qu'on a le modèle de progression, il faut comprendre comment le\nrendre concret dans l'architecture. Comment design-t-on le human-in-the-loop de\nmanière à ce qu'il ne soit pas un frein, mais une force ?\n.3 human in the loop by design\nHuman-in-the-loop by design\nLa question qu'on me pose le plus souvent, après avoir expliqué le modèle en\ntrois phases : \"Mais si on garde un humain dans la boucle, c'est encore vraiment un\nagent ?\"\nOui.\nEt c'est précisément ce qui le rend utilisable en production.\nLe human-in-the-loop (HITL) ; la capacité d'un agent à suspendre son\nexécution pour obtenir une validation humaine avant de continuer ; n'est pas une\nlimitation. Ce n'est pas un signe que le modèle n'est pas assez bon. C'est un choix\narchitectural. Et comme tous les bons choix architecturaux, il doit être fait avant\nd'écrire la première ligne de code, pas en urgence après le premier incident.\nLe problème du HITL en afterthought\nLa plupart des équipes que j'ai vues intègrent le human-in-the-loop de la même\nfaçon qu'elles intègrent les tests : après coup, quand quelque chose casse.\nL'agent fonctionne bien en démo. On le déploie. Un cas limite survient. L'agent\nprend une mauvaise décision avec des conséquences réelles. L'équipe ajoute une\nvalidation humaine en urgence, au mauvais endroit, dans le mauvais format, et ça crée\nplus de friction que de valeur.\nJ'ai vu un agent financier qui, après un incident, s'est retrouvé avec une\nvalidation humaine sur chaque transaction ; y compris les virements de 3EUR vers des\nfournisseurs récurrents. L'équipe avait paniqué et ajouté du contrôle sans réfléchir à la\ngranularité. Résultat : les opérationnels passaient leur journée à approuver des\ntransactions triviales, l'agent ne servait plus à rien, et six mois plus tard on l'avait\ndésactivé.\nLe HITL subi est un frein. Le HITL conçu est une force.\nOù placer les checkpoints\nTous les points de validation ne se valent pas. Le premier travail, quand on\ndesign un agent, c'est d'identifier les décisions qui méritent un arrêt.\nIl y a une règle simple que j'utilise : un checkpoint se justifie quand le coût\nd'une erreur dépasse le coût de l'interruption. Pas avant.\nCe critère se traduit en trois catégories de décisions à gater par défaut :\nLes décisions irréversibles . Envoyer un email à un client, supprimer un\nenregistrement, déclencher un paiement, publier un contenu ; une fois fait, c'est fait.\nL'agent peut avoirraison 99% du temps. Le 1% restant justifie un arrêt.\nLes décisions à impact élevé . Seuil financier au-delà d'un montant défini.\nEngagements contractuels. Modifications de données sensibles (RH, médical, légal).\nPlus l'impact est asymétrique, plus le checkpoint est justifié.\nLes décisions hors périmètre . Quand l'agent reçoit une demande qu'il n'a pas\nété conçu pour traiter, il ne doit pas improviser ; il doit escalader.Ce cas est plus subtil\nmais souvent le plus dangereux : l'agent répond avec confiance sur un terrain qu'il ne\nmaîtrise pas.\n[DIAGRAMME2.2] Système de gating avecflux de décision\nDeux types de validation : rapide et détaillée\nUne fois qu'on a identifié où placer les checkpoints, il faut décider quelle forme\nde validationon demande à l'humain.\nIl n'y a pas une seule façon de valider. Deux formats suffisent à couvrir la\nquasi-totalité des cas.\nLa validation rapide : l'humain approuve ou rejette une action en un clic, sans\navoir à comprendre tous les détails. Format binaire. Idéal pour les décisions dont le\ncontexte est évident et où la rapidité compte. \"L'agent veut envoyer cette relance au\nclient Dupont ; OK ou Annuler ?\"\nLa validation détaillée : l'humain doit fournir une explication, un contexte, ou\nune correction avant que l'agent puisse continuer. Format ouvert. Pour les décisions\ncomplexes, les cas ambigus, ou quand on veut capturer le raisonnement humain pour\naméliorer l'agent sur la durée.\nExemple concret : J'ai travaillé avec une équipe RH qui utilisait un agent pour\nanalyser des candidatures et proposer des shortlists. En phase supervisée, l'agent\nsoumettait sa sélection avec une justification pour chaque candidat. Les recruteurs\nvalidaient d'un clic pour les cas clairs ; candidat manifestement qualifié ou éliminatoire.\nPour les cas limites, ils devaientnoter pourquoi ils modifiaient la recommandation. Ces\nannotations ont alimenté trois révisions du prompt système en deux mois. À la fin, le\ntaux de validationsans modification était passé de 71% à 89%.\nLe HITL n'était pas qu'un filet de sécurité. C'était une boucle d'amélioration\ncontinue.\nL'implémentation concrète\nLe système HITL le plus simple est aussi le plus robuste. Voicisa structure de\nbase :\n# ? Agent sans HITL ; autonomie totale par défaut def execute_action(agent,\naction): result = agent.run(action) apply_to_system(result) return result # ? Agent avec\nHITL structuré def execute_action(agent, action, context): result = agent.run(action) if\nrequires_human_validation(result, context): validation_type =\nget_validation_type(result) if validation_type == \"quick\": approved =\nrequest_quick_approval(result) else: approved, feedback =\nrequest_detailed_approval(result) if feedback:\nlog_feedback_for_improvement(feedback, result) if not approved: return\nhandle_rejection(result, context) apply_to_system(result) return result def\nrequires_human_validation(result, context): return ( result.is_irreversible or\nresult.financial_impact > context.approval_threshold or result.action_type in\ncontext.always_validate_actionsor result.confidence_score < context.min_confidence)\nQuatre conditions. C'est tout. Et c'est suffisant pour couvrir 90% des cas en\nproduction.\nNotez le confidence_score dans la dernière condition. C'est souvent oublié, et\nc'est pourtant l'un des signaux les plus utiles. Quand l'agent lui-même n'est pas sûr de\nsa réponse ; et les bons modèles savent l'indiquer ; c'est souvent le signe qu'un humain\ndoit regarder.\nCe que le HITL révèle\nUn détail que personne ne mentionne : le human-in-the-loop est aussi un outil\nde diagnostic.\nLes décisions fréquemment rejetées par les validateurs humains sont un signal\ndirect que quelque chose ne va pas dans le raisonnement de l'agent. Les décisions\nsystématiquement approuvées sans modification signalent un périmètre qui pourrait être\npassé en automatique. Les décisions qui génèrent beaucoup de feedback détaillé\nindiquent des zones où le prompt ou les règles métier manquent de clarté.\nUn agent sans HITL est une boîte noire. Un agent avec HITL est un système\nobservable.\n# Logger les patterns de validation pour le diagnostic def\nlog_validation_outcome(result, approved, feedback=None): entry = { \"action_type\":\nresult.action_type, \"approved\": approved, \"had_feedback\": feedback is not None,\n\"confidence\": result.confidence_score, \"timestamp\": now() }\nvalidation_log.append(entry) # Analyser les patterns en régression def\nanalyze_hitl_patterns(log, window_days=14): rejection_rate_by_action =\ncompute_rejection_rate(log, window_days) high_feedback_actions =\nfind_high_feedback_actions(log, window_days) low_confidence_rejections =\nfind_confidence_correlated_rejections(log) return { \"candidates_for_automation\": [ a\nfor a, r in rejection_rate_by_action.items() if r < 0.05 ],\n\"candidates_for_prompt_update\": high_feedback_actions,\n\"confidence_threshold_review\":low_confidence_rejections}\nCe logging n'est pas du overhead. C'est le mécanisme qui permet de justifier la\nprogression vers le niveau suivant ; et qu'on a vu dans la section précédente comme\ncondition de passage de phase Assistée à phase Supervisée.\nLe HITL comme signal de maturité\nIl y a une ironie dans tout ça.\nLes équipes qui résistent le plus au human-in-the-loop sont souvent celles qui\nen ont le plus besoin. Elles veulent l'autonomie avant d'avoir les données qui la\njustifient. Elles voient le HITL comme un signe que l'agent \"ne marche pas encore\nbien\".\nLes équipes qui ont des agents en production depuis plus d'un an voient les\nchoses différemment. Pour elles, le HITL est une fonctionnalité qu'on désactive\nprogressivement, point de contrôle par point de contrôle, au fur et à mesure que les\nmétriques le permettent.\nCe n'est pas de la prudence excessive.C'est de l'ingénierie.\nLa prochaine question est naturelle : tous les checkpoints ne se valent pas, et\ntous n'ont pas besoin d'un humain. Comment structure-t-on un système de gating à\nplusieurs niveaux ; automatique, semi-automatique, humain ; pour ne mobiliser\nl'attention humaine qu'à bon escient ?\n.4 gating validation confirmations\nGating, validation, confirmations\nLa section précédente a posé la règle fondamentale : un checkpoint se justifie\nquand le coût d'une erreur dépasse le coût de l'interruption.\nMaintenant, la question pratique : comment on structure ça dans le code ?\nParce que \"mettre un humain dans la boucle\" ne veut rien dire si tous les\ncheckpoints se ressemblent. Un virement de 3EUR vers un fournisseur récurrent ne\nmérite pas le même traitement qu'un licenciement automatisé. Pourtant, les deux\npeuvent théoriquement déclencher une \"validationhumaine\".\nLe gating bien conçu, c'est précisément ça : router chaque décision vers le\nniveau de contrôle exact qu'elle mérite. Ni plus, ni moins.\nTrois niveaux, pas deux\nL'erreur la plus courante que j'ai vue : concevoir le gating comme un\ninterrupteur binaire. Soit l'action passe en automatique, soit elle attend un humain.\nC'est trop grossier.\nEntre \"automatique\" et \"humain\", il y a une zone utile que la plupart des\néquipes ignorent : le gating semi-automatique. Un classifier qui inspecte l'action,\napplique des règles métier et prend une décision ; sans impliquer un humain, mais sans\nnon plus laisser l'agent faire ce qu'il veut.\n[SCHÉMA 2.3] Les trois niveaux de gating : automatique -> semi-automatique\n-> humain\nNiveau 1 ; Automatique. L'action passe sans validation. Conditions : décision\nréversible,impact faible, périmètre connu, pattern déjà validédes centaines de fois.\nExemple : classer un ticket entrant dans une catégorie. Envoyer une\nconfirmation de rendez-vous standardisée. Récupérer des données depuis une API en\nlecture seule.\nNiveau 2 ; Semi-automatique. L'action est inspectée par un système de règles\nou un classifier avant de passer. Conditions : décision potentiellement sensible, mais\ncritères objectivementévaluables.\nExemple : remboursement dont le montant est dans la plage habituelle mais le\nmotif est inhabituel. Email sortant vers un nouveau domaine non encore vu.\nModification d'un champ structuré dans la base de données.\nNiveau 3 ; Humain. L'action attend une approbation explicite. Conditions :\ndécision irréversible,impact élevé,hors périmètre, ou confidence faible.\nExemple : suppression d'un compte client. Engagement contractuel. Toutce qui\ndéclenche un effet externe irréversible (email de licenciement, modification d'un\ncontrat, paiement au-dessus d'un seuil).\nImplémenter le routeur de gating\nLe c?ur du système, c'est une fonction de routage. Elle prend une action en\nentrée et retourne le niveaude gating requis. Voicisa structure :\nfrom enum import Enum class GatingLevel(Enum): AUTOMATIC =\n\"automatic\" SEMI_AUTO = \"semi_automatic\" HUMAN = \"human\" def\nroute_to_gating_level(action, context) -> GatingLevel: # Niveau 3 : humain obligatoire\nif action.is_irreversible: return GatingLevel.HUMAN if action.financial_impact >\ncontext.human_threshold: return GatingLevel.HUMAN if action.action_type in\ncontext.always_human_actions: return GatingLevel.HUMAN if\naction.confidence_score < context.min_confidence: return GatingLevel.HUMAN #\nNiveau 2 : inspection automatique if action.financial_impact >\ncontext.semi_auto_threshold: return GatingLevel.SEMI_AUTOif action.action_type in\ncontext.inspect_actions: return GatingLevel.SEMI_AUTO if\naction.touches_sensitive_data: return GatingLevel.SEMI_AUTO # Niveau 1 : passage\ndirect return GatingLevel.AUTOMATIC def execute_with_gating(agent, action,\ncontext): result = agent.plan(action) level = route_to_gating_level(result, context) if\nlevel == GatingLevel.AUTOMATIC: return execute(result) if level ==\nGatingLevel.SEMI_AUTO: if not passes_automated_checks(result, context): return\nescalate_to_human(result, context, reason=\"failed_auto_check\") return execute(result)\n# GatingLevel.HUMAN approved, feedback = request_human_approval(result) if\nfeedback: log_feedback_for_improvement(feedback, result) if not approved: return\nhandle_rejection(result, context) return execute(result)\nQuelques détails qui comptent :\nLe semi_auto_threshold et le human_threshold sont des paramètres de\nconfiguration ; pas des constantes dans le code. Ils doivent pouvoir être ajustés sans\nredéploiement. Les seuils qui marchent en phase supervisée ne sont pas les mêmes que\nceux de la phase autonome.\nLa fonction passes_automated_checks est le c?ur du niveau 2. C'est là qu'on\nencode les règles métier : limites de montant par type de fournisseur, whitelist de\ndomaines email, format attendu des données modifiées. Si quelque chose ne correspond\npas au pattern attendu, on escalade directement au niveauhumain.\nL'exemple de l'agent de facturation\nExemple concret : J'ai travaillé avec une équipe finance qui avait un agent\nchargé de traiter les factures entrantes ; vérification, rapprochement comptable,\ndéclenchement du paiement.\nAu départ, l'agent avaitdeux modes : soit il traitait tout seul, soit tout passait en\nrevue humaine. Résultat : les comptables passaient 3 heures par jour à approuver des\nfactures de fournisseurs récurrents avec des montants identiques aux mois précédents.\nAucune valeurajoutée, juste de la friction.\nOn a introduit trois niveaux de gating avec des critères précis : Automatique :\nfournisseur whitelisté, montant dans la tolérance de +/-5% du mois précédent, format\nde facture valide. Semi-automatique : fournisseur connu mais montant atypique, ou\nnouveau format de facture ; le classifier vérifie la cohérence avec les données\ncontractuelles. Humain : nouveau fournisseur, montant au-dessus de 5 000EUR,\nfacture avecmention légale inhabituelle.\nEn deux semaines, 73% des factures passaient en automatique. Les comptables\nne voyaient plus que les cas qui méritaient vraiment leur attention. Le temps de\ntraitement moyen est tombé de 2,3 jours à 4 heures.\nCe qu'on gate, et ce qu'on ne gate pas\nUne erreur symétrique à sous-gater : sur-gater.\nUn système qui demande des confirmations à chaque étape finit par être ignoré.\nLes utilisateurs qui doivent approuver 40 actions par jour développent une approbation\nréflexe ; ils cliquent \"OK\" sans lire. Le gating devient inutile, voire dangereux : il\ndonne une fausse impression de contrôle.\nLa règle que j'applique : si une action peut être approuvée sans être lue, elle\nne devrait pas passer par le niveau humain.\nCe n'est pas une règle contre la sécurité. C'est une règle pour que la sécurité soit\nréelle. Un humain qui valide 5 décisions par jour les lit. Un humain qui en valide 50 les\napprouve en automatique.\n# ? Gating indiscriminé ; crée de la fatigue de validation ALWAYS_VALIDATE\n= True# Toutpasse par un humain # ? Gating calibré ; l'attention humaine va là où elle\ncompte def should_involve_human(action, context): if action.is_irreversible: return\nTrue if action.financial_impact > context.human_threshold: return True # Éviter la\nfatigue de validation if action.is_routine and action.is_low_impact: return False return\naction.confidence_score < context.min_confidence\nCalibrer les seuils au fil du temps\nLes seuils de gating ne sont pas des vérités absolues. Ils doivent évoluer avec la\nmaturité de l'agent.\nAu début de la phase supervisée, on gate large : mieux vaut trop contrôler que\npas assez. Les faux positifs (actions inoffensives qui passent en revue humaine) sont\nacceptables ; ils alimentent le diagnostic.\nAvec le temps, on exploite les données de validation pour ajuster. Si une\ncatégorie d'actions est approuvée à 98% sans modification depuis 3 mois, c'est un\ncandidat pour passer en semi-automatique ou en automatique. Si une catégorie génère\n30% de rejets humains, c'est un signal qu'il faut revoir le comportement de l'agent sur\nce type d'action.\nLe gating n'est pas une configuration statique. C'est une variable d'ajustement de\nla progression vers l'autonomie.\n[TABLEAU2.1] Calibration des seuils de gating par phase de déploiement\nOn a maintenant tous les mécanismes de contrôle : le modèle de progression en\ntrois phases, le HITL par design, et le gating à plusieurs niveaux. La question suivante\nest celle de la progression elle-même : comment formalisée la montée en autonomie\npour qu'elle soit pilotée par des données et non par de l'impatience ?\n.5 patterns montee progressive autonomie\nPatterns de montée progressive en autonomie\nOn a maintenant le modèle de progression en trois phases, le HITL par design,\net le gating à plusieurs niveaux. Mais il manque encore quelque chose : une réponse\nformelle à la question que tout le monde pose en réunion.\n\"Quand est-ce qu'on peut passer en phase suivante?\"\nC'est une bonne question. Et si on n'a pas de réponse précise, la réponse par\ndéfaut sera soit l'impatience (\"ça fait deux semaines, c'est bon non ?\"), soit la peur (\"on\nlaisse comme ça encore un peu\"). Les deux sont des mauvaisesboussoles.\nCe qui manque, c'est un framework de gouvernance de l'autonomie. Pas une\nliste de bonnes pratiques ; un système avec des critères mesurables, des seuils définis à\nl'avance,et une logique de décision qui s'applique sans discussion.\nCe qu'on mesure avant de progresser\nLe passage d'une phase à l'autre doit être justifié par des données. Trois\nmétriques sont indispensables.\nLa précision décisionnelle. Sur les décisions prises par l'agent pendant la phase\nen cours, quel pourcentage était correct ? \"Correct\" est défini à l'avance par l'équipe\nmétier ; pas par le modèle. Pour un agent de support, correct signifie peut-être \"la\nréponse a résolu le problème au premier contact\". Pour un agent de facturation, correct\nsignifie \"le rapprochement était juste et le paiement approprié\".\nLe taux de faux positifs. Parmi les décisions gatées vers un humain, combien\nont été approuvées sans modification ? Un taux de faux positifs élevé signifie que le\ngating est trop conservateur ; et que l'agent est probablement prêt pour plus\nd'autonomie sur ces cas. Un taux qui baisse soudainement après avoir été stable est un\nsignal d'alerte : quelque chose a changé dans le comportement de l'agent.\nL'absence d'erreur critique. Aucun seuil de précision n'autorise le passage si\nl'agent a commis une erreur de catégorie 1 pendant la période d'observation ; une\ndécision irréversible incorrecte, une violation d'une règle métier fondamentale, une\naction avec impact client direct non planifié. Une seule erreur critique remet le\ncompteur à zéro.\nCes trois métriques ensemble donnent une image fiable. Chacune seule est\ninsuffisante.\nLes seuils de progression\nVoiciles critères que j'utilise comme base pour passer d'une phase à l'autre :\nPROGRESSION_CRITERIA = { \"assisted_to_supervised\": { \"min_decisions\":\n100, # Volumeminimum observé \"min_accuracy\": 0.92, # 92% de décisions correctes\n\"max_false_positive_rate\": 0.15, # 15% max de faux positifs au gating\n\"critical_errors_allowed\": 0, # Zéro tolérance sur erreurs critiques\n\"observation_period_days\": 30, # Période d'observation minimum },\n\"supervised_to_autonomous\": { \"min_decisions\": 500, \"min_accuracy\": 0.97,\n\"max_false_positive_rate\": 0.05, \"critical_errors_allowed\": 0,\n\"observation_period_days\": 60, } } def can_progress_to_next_phase(metrics,\ncurrent_phase) -> tuple[bool, str]: criteria =\nPROGRESSION_CRITERIA.get(current_phase) if not criteria: return False, \"Phase\ninconnue ou terminale\" if metrics.total_decisions < criteria[\"min_decisions\"]: return\nFalse, f\"Volume insuffisant : {metrics.total_decisions}/{criteria['min_decisions']}\" if\nmetrics.accuracy < criteria[\"min_accuracy\"]: return False, f\"Précision insuffisante :\n{metrics.accuracy:.2%}/{criteria['min_accuracy']:.2%}\" if metrics.false_positive_rate >\ncriteria[\"max_false_positive_rate\"]: return False, f\"Trop de faux positifs :\n{metrics.false_positive_rate:.2%}\" if metrics.critical_errors >\ncriteria[\"critical_errors_allowed\"]: return False, f\"Erreur(s) critique(s) détectée(s) :\n{metrics.critical_errors}\" if metrics.observation_days <\ncriteria[\"observation_period_days\"]: return False, f\"Période d'observation trop courte :\n{metrics.observation_days}/{criteria['observation_period_days']} jours\" return True,\n\"Tousles critères sont remplis\"\nLes seuils ci-dessus sont un point de départ, pas une vérité universelle.Un agent\nqui prend des décisions financières a besoin de critères plus stricts qu'un agent qui\nclasse des emails. L'important, c'est que les seuils soient définis avant de commencer à\ncollecter les données ; pas après, quand on a enviede progresser.\nLa rétrogradation : une fonctionnalité, pas un échec\nUn système de progression sans rétrogradation n'est pas robuste. C'est une\nrampe sans filet.\nLa rétrogradation automatique, c'est le mécanisme qui ramène l'agent au niveau\nprécédent si ses métriques se dégradent au-delà d'un seuil. Elle doit être implémentée\ndès le début, pas ajoutée en urgence après le premier incident.\nExemple concret : Un agent de modération de contenu avaitprogressé en phase\nsupervisée après deux mois de phase assistée solides. Précision à 94%, zéro erreur\ncritique. Toutallait bien.\nTrois semaines plus tard, son fournisseur LLM a déployé une mise à jour\nsilencieuse du modèle. Rien dans les logs. Aucune notification. Mais la précision de\nl'agent sur les contenus ambigus est tombée de 94% à 81% en 72 heures.\nLe monitoring l'a détecté. La rétrogradation automatique s'est déclenchée.\nL'agent est passé en phase assistée le temps qu'on analyse la cause ; changement de\ncomportement du modèle sur les nuances culturelles du corpus ; et qu'on ajuste le\nprompt système.\nSans rétrogradation automatique, ces 72 heures auraient généré trois semaines\nde corrections manuelles.\nDEGRADATION_THRESHOLDS= { \"supervised\": { \"min_accuracy\": 0.88, #\nEn dessous -> retour en phase assistée \"max_critical_errors_7d\": 1, # 1 erreur critique\nsur 7 jours -> retour immédiat }, \"autonomous\": { \"min_accuracy\": 0.94, # En dessous\n-> retour en phase supervisée \"max_critical_errors_7d\": 0, # Zéro tolérance en\nautonomie complète } } def check_for_degradation(metrics, current_phase) ->\ntuple[bool, str]: thresholds = DEGRADATION_THRESHOLDS.get(current_phase) if\nnot thresholds: return False, \"Phase sans seuil de rétrogradation\" if metrics.accuracy_7d\n< thresholds[\"min_accuracy\"]: return True, f\"Dégradation de précision :\n{metrics.accuracy_7d:.2%}\" if metrics.critical_errors_7d >\nthresholds[\"max_critical_errors_7d\"]: return True, f\"Erreur(s) critique(s) sur 7 jours :\n{metrics.critical_errors_7d}\" return False, \"Métriques stables\"\nCe que le monitoring doit capturer\nUne montée en autonomie pilotée par les données exige un monitoring\ndécisionnel ; pas juste un monitoring des réponses.\nLa différence est importante. Un agent peut générer des réponses textuelles\ncorrectes et prendre de mauvaises décisions. Ce qu'on veut observer,c'est la qualité du\njugement : quelle décision a été prise, dans quel contexte, avec quel résultat, sur quelle\nbase.\n[DIAGRAMME 2.4] Pipeline de monitoring décisionnel : action -> niveau de\ngating -> résultat -> feedback -> métriques\nLe minimum viable : logger chaque décision avec son type, son niveau de\ngating, l'approbation ou le rejet si passage humain, et le résultat final observé. Sans ce\nlogging, les métriques de progression sont impossibles à calculer et la rétrogradation\nautomatique n'a rien sur quoi s'appuyer.\nLe livrable de la Partie 2\nC'est ici que convergentles quatre sections de cette partie.\nLe modèle Assisté -> Supervisé -> Autonome (2.2) donne la structure. Le HITL\nby design (2.3) place les checkpoints dans l'architecture. Le gating à trois niveaux (2.4)\nroute chaque décision vers le bon contrôle. Et les patterns de progression formalisent la\ngouvernance de l'autonomie : quand progresser, quand rétrograder, et comment piloter\nla transition par les données.\nEnsemble, ces quatre composants forment ce que j'appelle un système de\ndéploiement progressif ; l'alternative à l'agent autonome lancé le jour J et espéré le\nmois suivant.\nAucun de ces composants ne fonctionne seul. Le gating sans progression, c'est\nun agent bloqué indéfiniment. La progression sans rétrogradation, c'est une montée sans\nsécurité. Et tout ça sans monitoring décisionnel, c'est de la confiance aveugle.\nUn agent n'est pas un prompt intelligent. C'est un système. Et comme tout\nsystème, il se pilote.\nLa prochaine erreur structurelle concerne une ressource que presque personne\nne traite correctement : le contexte. Pas comme un paramètre à remplir ; comme une\nressource à gérer.\n"

    "title": "Chapitre 3 - Le contexte n'est pas un paramètre",
    "md": "# Chapitre 3 - Le contexte n'est pas un paramètre\n\n3.1 – Le contexte n'est pas un paramètre\nLa Partie 2 nous a appris comment contrôler l'autonomie d'un agent.\nMaintenant, on vaparler d'une autre ressource qu'on maltraite systématiquement.\nLe contexte.\nPresque tout le monde le traite comme un paramètre. Un champ à remplir. Un\nendroit où on colle des informations avantd'appuyer sur \"envoyer\".\nC'est une erreur.\nLe mythe de la fenêtre infinie\nLa première chose qu'on voit sur la fiche technique d'un modèle, c'est la taille\nde la context window.32K tokens. 128K tokens. 200K tokens.\nEt notre cerveau fait immédiatement le calcul : \"Super, je peux mettre tout ça\ndedans.\"\nC'est le mythe de la fenêtre infinie.\nLa réalité est plus compliquée.\nUne fenêtre de contexte de 128K tokens, ce n'est pas une mémoire de 128K\ntokens. C'est une capacité maximale d'attention ; et l'attention a des limites. Plus tu\nremplis la fenêtre, plus le modèle a du mal à identifier ce qui compte vraiment.\nC'est ce que les chercheurs ont appelé le phénomène \"lost in the middle\" : les\ninformations placées au milieu d'un long contexte sont significativement moins bien\nutilisées que celles en début ou en fin de fenêtre. Le modèle ne lit pas ton contexte de\nmanière uniforme. Il a des zones d'attention privilégiées; et des zones mortes.\nExemple concret :\nJ'ai travaillé sur un agent de support client pour un éditeur de logiciels B2B.\nL'idée semblait solide : alimenter l'agent avec la documentation complète du produit ;\nenviron200 pages ; pour qu'il puisse répondre à n'importe quelle question.\nLe résultat ? L'agent était confiant. Très confiant. Mais il ratait régulièrement\ndes procédures précises qui se trouvaient au milieu de la documentation. Un client\nposait une question sur le processus de remboursement ; procédure en page 87 ; et\nl'agent inventaitune réponse plausible plutôt que de retrouver la bonne.\nLe problème n'était pas le modèle. Le problème, c'est qu'on avait noyé\nl'information importante dans un contexte surchargé.\nLe coût réel d'un contexte surchargé\nRemplir la fenêtre à ras bord a trois conséquences directes que la plupart des\néquipes ignorent.\n1. Latence\nPlus le contexte est long, plus l'inférence est lente. Sur un agent de support en\ntemps réel, la différence entre un contexte de 4K et un contexte de 50K tokens peut\nreprésenter plusieurs secondes de délai à chaque message. Sur une journée d'utilisation,\nc'est une expérience dégradée.\n2. Coût\nLes providers facturent au token ; input et output. Un contexte de 50K tokens\nsur 10 000 requêtes par jour, c'est 500 millions de tokens de contexte facturés. La\nfacture grimpe vite.\n3. Qualité des décisions\nC'est le plus important. Un contexte trop dense dégrade la qualité des\nraisonnements. Le modèle a plus de mal à isoler les informations pertinentes. Il est plus\nsusceptible d'halluciner ; ou de répondre en mélangeant des informations sans lien\ndirect.\n# ? Pattern : contexte statique et surchargé def handle_query(user_query: str) ->\nstr: # On charge toute la documentation ; \"au cas où\" full_documentation =\nload_all_docs() # 200 pages context = f\"\"\" Documentation complète:\n{full_documentation} Question utilisateur: {user_query} \"\"\" return\nllm.generate(context) # ? Pattern : contexte dynamique et ciblé def\nhandle_query(user_query: str) -> str: # On récupère uniquement ce qui est pertinent\nrelevant_docs = retrieval.search(user_query, top_k=3) context = f\"\"\" Documentation\npertinente: {format_docs(relevant_docs)} Question utilisateur: {user_query} \"\"\" return\nllm.generate(context)\nLa différence entre ces deux patterns, c'est la différence entre un agent qui\ndonne des réponses vagueset un agent qui donne des réponses précises.\nLe contexte comme budget\nIl faut changer de métaphore.\nUn contexte, ce n'est pas un entrepôt où tu stockes tout ce qui pourrait être utile.\nC'est un budget. Limité. Précieux. À allouer intelligemment.\nChaque token que tu mets dans le contexte, c'est un token qui dilue l'attention\ndu modèle. C'est un choix. Pas un détail.\nPense à ça comme à une salle de réunion. Tu peux inviter 50 personnes ou 5\npersonnes. Avec50 personnes, tout le monde est là ; mais personne n'écoute vraiment.\nAvec5 personnes ciblées, la conversationest précise, efficace,actionnable.\nLe contexte d'un agent, c'est pareil.\n[SCHÉMA 3.1] Budget de contexte : allocation des tokens par priorité\nLa bonne approche consiste à prioriser : Ce qui est stable et critique :\ninstructions système, règles métier, identité de l'agent Ce qui est pertinent pour la\nrequête : informations récupérées dynamiquement, historique récent Ce qui est\noptionnel : contexte additionnel si la fenêtre le permet\nToutle reste, on le laisse dehors.\nPourquoi tout le monde fait cette erreur\nIl y a une raison simple pour laquelle le contexte surchargé est si répandu : c'est\nla solution de facilité.\nConstruire un système de retrieval pertinent demande du travail. Définir ce qui\nva dans le contexte et ce qui n'y va pas demande de la réflexion. Alors on prend le\nraccourci : \"Je mets tout dedans, le modèle vabien trouver ce qu'il faut.\"\nLe modèle ne trouve pas \"ce qu'il faut\". Il génère le token le plus probable\ncompte tenu de tout ce qu'on lui a donné. Si on lui donne trop d'informations\ncontradictoires ou non pertinentes, sa sortie le reflète.\nExemple concret :\nUn agent de qualification de leads dans une équipe commerciale. L'équipe avait\nmis dans le contexte : Le CRM complet (800 lignes de données) Les 50 derniers\ne-mails de prospects La documentation produit complète Les notes de réunion des 6\nderniers mois\nL'agent répondait. Mais ses qualifications étaient incohérentes. Il \"oubliait\"\nparfois des informations cruciales sur un prospect pourtant présentes dans le CRM. Il\nmélangeait les caractéristiques de produits différents.\nLa solution ? Réduire drastiquement le contexte à ce qui est directement\npertinent pour chaque lead. Résultat : qualifications plus précises, plus rapides, plus\ncohérentes.\nMoins, c'est plus.\nCe que ça change architecturalement\nTraiter le contexte comme une ressource, pas comme un paramètre, change la\nfaçon dont tu conçois ton agent.\nAu lieu de : \"Qu'est-ce que je mets dans le prompt ?\"\nTu te poses la question : \"Qu'est-ce que l'agent a besoin de savoir exactement à\ncette étape ?\"\nC'est un changement de perspective. Et il a des implications concrètes :\nRetrieval dynamique : tu récupères ce qui est pertinent à la volée, pas statiquement\nCompression de l'historique : au lieu de garder toute la conversation, tu résumes ce\nqui compte Priorisation explicite : tu définis une hiérarchie d'importance dans le\ncontexte Budget contrôlé : tu mesures la taille du contexte et tu la plafonnez\nCe ne sont pas des optimisations. Ce sont des décisions architecturales\nfondamentales.\nLa suite de cette partie va les développer une par une. Mais avant ça, il faut\nancrer le principe : le contexte n'est pas un espace de stockage. C'est une fenêtre\nd'attention. Et l'attention se gère.\nLe vrai problème : on traite le LLM comme un moteur de recherche\nIl y a une confusion fondamentale qui explique presque tous les problèmes de\ncontexte.\nOn traite le LLM comme un moteur de recherche.\nOn met des informations dedans. On pose une question. On attend qu'il \"trouve\"\nla bonne réponse.\nMais un LLM n'est pas un moteur de recherche. Il ne \"cherche\" pas dans le\ncontexte. Il génère une réponse cohérente avectout ce qu'il a vu ; pendant le pretraining\net dans la fenêtre de contexte actuelle.\nSi tu lui donnes un contexte bien construit, il génère une réponse précise. Si tu\nlui donnes un contexte surchargé et mal organisé,il génère une réponse approximative.\nC'est mécanique.\nEt c'est pour ça que \"mettre plus\" ne résout jamais le problème. Souvent, ça\nl'aggrave.\nLa bonne question n'est pas \"Combien de tokens puis-je utiliser ?\"\nLa bonne question, c'est : \"Quel est le contexte minimal qui permet une\ndécision optimale ?\"\nC'est ça, traiter le contexte comme une ressource.\nLes sections suivantes vont détailler comment construire ce contexte minimal :\ncontexte dynamique vs statique, la différence entre fenêtre et mémoire, comment\nconcevoir un retrieval efficace, et comment allouer le budget de tokens de manière\nintelligente.\n.2 contexte dynamique vs statique\nContexte dynamique vs statique\nLa section précédente a posé le diagnostic : on traite le contexte comme un\nentrepôt, alors que c'est un budget. Maintenant, la question pratique qui suit\nnaturellement : comment organiserce budget ?\nLa réponse tient en une distinction fondamentale que la plupart des équipes\nignorent.\nTout ce qu'on met dans le contexte n'a pas le même régime de pertinence.\nCertaines informations sont toujours vraies, pour toutes les requêtes, quel que soit\nl'utilisateur. D'autres ne sont vraies que pour cette requête précise, à cet instant précis,\npour cet utilisateur.\nConfondre les deux, c'est surcharger le contexte avec des informations qui n'ont\nrien à faire là ; ou, à l'inverse,oublier d'y mettre ce qui est indispensable.\nCe qui est statique ; et ce qui doit le rester\nLe contexte statique, c'est ce qu'on injecte systématiquement, quel que soit le\ncontenu de la requête.\nL'identité de l'agent : son rôle, ses responsabilités, ses limites. Les règles métier\ninvariantes : ce qu'il peut faire, ce qu'il ne peut jamais faire. Les contraintes de format\net de tone : comment il doit répondre, ce qu'il doit éviter.\nCes informations sont stables. Elles ne changent pas d'une requête à l'autre. Les\nmettre en statique est logique ; on les charge une fois, on les maintient dans le prompt\nsystème, et on y touche rarement.\nExemple concret :\nPour un agent de support client dans le secteur bancaire, le contexte statique\ncontient typiquement : le rôle de l'agent (\"tu es un assistant de support bancaire\"), les\nrègles de conformité non négociables (\"tu ne peux jamais partager d'informations\nconfidentielles sur un autre client\"), les procédures de refus (\"si tu ne peux pas\nrépondre à une demande, explique pourquoi et oriente vers un conseiller humain\"), et le\nformat de réponse attendu.\nCes éléments occupent environ 300 à 500 tokens. Ils sont là à chaque appel. Et\nc'est normal ; leur présence permanente garantit la cohérence du comportement.\nCe qui n'est pas normal, c'est d'y mettre également les 150 articles de la base de\nconnaissance, les historiques de tous les clients, et la documentation complète des\nproduits. Toutça n'est pas statique ; c'est dynamique. Et sa place n'est pas là.\nCe qui est dynamique ; et comment le construire\nLe contexte dynamique, c'est tout ce qui est construit à la volée, spécifiquement\npour cette requête.\nL'historique récent de la conversation en cours. Les documents récupérés par le\nsystème de retrieval parce qu'ils sont pertinents pour la question posée. Les données\nspécifiques à l'utilisateur qui interagit à ce moment précis. Les résultats d'outils\nexécutéspendant la boucle de l'agent.\nAucun de ces éléments n'a sa place dans un prompt statique. Ils ne sont utiles\nque dans un contexte précis ; et leur injection doit être calculée, pas automatique.\n# ? Pattern : tout injecter en statique SYSTEM_PROMPT = f\"\"\" Tu es un agent\nde support bancaire. Règles : {compliance_rules} Documentation produit complète :\n{all_product_docs} # 400 pages Historique client de toute la base : {full_crm_dump} #\nDes milliers d'enregistrements Procédures internes : {all_procedures} \"\"\" def\nhandle_query(user_id: str, query: str) -> str: return llm.generate(SYSTEM_PROMPT,\nquery) # ? Pattern : séparer statique et dynamique STATIC_SYSTEM_PROMPT= \"\"\"\nTu es un agent de support bancaire. Ton rôle : répondre aux questions des clients sur\nleurs comptes et produits. Règles impératives: ne jamais partager de données d'un autre\nclient. Format : réponse claire, concise, avec une action recommandée si pertinent. \"\"\"\ndef handle_query(user_id: str, query: str) -> str: # Contexte dynamique : construit\nspécifiquement pour cette requête user_data = crm.get_customer_summary(user_id) #\nDonnées de CE client relevant_docs = retrieval.search(query, top_k=3) # Docs\npertinents POUR cette question recent_history = conversation.get_last_turns(n=5) #\nHistorique RÉCENT de CETTE session dynamic_context = build_context(user_data,\nrelevant_docs, recent_history) return llm.generate(STATIC_SYSTEM_PROMPT,\ndynamic_context, query)\nLa différence n'est pas cosmétique. Le premier pattern charge potentiellement\ndes milliers de tokens à chaque requête, dont 98% ne sont jamais utilisés. Le second\ninjecte exactement ce dont l'agent a besoin ; et rien d'autre.\nLa règle de séparation\nComment décider si une information appartient au statique ou au dynamique ?\nUne question simple : est-ce que cette information est nécessaire pour toutes les\nrequêtes, ou seulement pour certaines ?\nSi la réponse est \"toutes\" ; statique. Si la réponse est \"ça dépend de la requête\" ;\ndynamique.\n[SCHÉMA 3.2] Séparation statique / dynamique : critères de classification\nLa documentation produit ? Dynamique. Une question sur les frais de virement\nn'a pas besoin de la documentation sur les prêts immobiliers. Le retrievals'en occupe.\nLes préférences de l'utilisateur ? Dynamique. Elles varient selon l'utilisateur qui\ninteragit.\nL'identité et le rôle de l'agent ? Statique. Ça ne change jamais.\nLes règles de conformité ? Statique. Elles s'appliquent à toutes les décisions.\nExemple concret :\nJ'ai accompagné une équipe qui construisait un agent de qualification de leads\ncommerciaux. Au démarrage, leur prompt statique contenait tout : les fiches de tous les\nproduits, les critères de qualification détaillés pour chaque segment de marché, les\nscripts de conversation recommandés, les objections courantes et leurs réfutations, et\nles données CRM complètes.\nLe prompt système faisait 8 000 tokens. L'agent mettait 4 à 6 secondes à\nrépondre. Les qualifications étaient inconsistantes ; l'agent \"confondait\" parfois les\ncaractéristiques de produits différents.\nOn a redessiné la séparation. Statique : le rôle de l'agent, les critères de\nqualification généraux (7 critères clés, 300 tokens), les règles de format. Dynamique :\nla fiche du produit concerné (récupérée selon le produit mentionné par le prospect), les\ndonnées CRM du lead en cours (récupérées par son identifiant), les 3 objections les\nplus fréquentes pour ce segment (récupérées par le système de retrieval selon le\ncontexte).\nLe prompt statique est passé de 8 000 tokens à 400. Le contexte dynamique\ntourne en moyenne autour de 1 500 à 2 000 tokens selon la requête. Tempsde réponse :\n1,2 secondes. Qualité des qualifications : nettement plus précise et cohérente.\nMoins de tokens. Meilleures décisions.\nL'assemblage : statique d'abord, dynamique ensuite\nUne dernière précision sur l'ordre d'assemblage.\nQuand on construit le contexte final, l'ordre dans lequel les éléments\napparaissent n'est pas neutre. Le phénomène \"lost in the middle\" qu'on a vu en 3.1\ns'applique ici aussi : les informations en début de contexte et en fin de contexte captent\nplus l'attention que celles au milieu.\nLa structure à respecter : le contexte statique en premier (identité, règles), la\nrequête de l'utilisateur juste après, puis le contexte dynamique (retrieval, données\nspécifiques) en dernier.Ou l'inverse: statique, puis dynamique, puis requête.\nCe qui ne fonctionne pas : noyer la requête au milieu d'un contexte dense.\nL'agent la voit moins bien. Et ses réponses le reflètent.\ndef assemble_context(static_prompt: str, dynamic_context: str, user_query: str)\n-> str: # ? Structure recommandée : statique -> dynamique -> requête return f\"\"\"\n{static_prompt} --- Contexte pertinent pour cette requête --- {dynamic_context} ---\nRequête utilisateur --- {user_query} \"\"\"\nLa séparation statique/dynamique n'est pas un détail d'implémentation. C'est le\nfondement d'une gestion saine du contexte. Une fois cette distinction clairement établie\ndans l'architecture, les problèmes de latence, de coût et de qualité de décision\ndiminuent mécaniquement ; parce qu'on arrête de traiter le contexte comme un\nentrepôt.\nOn commence à le traiter comme ce qu'il est : une ressource qu'on alloue avec\nintention.\nLa section suivante va creuser une confusion très répandue : celle entre la\nfenêtre de contexte et la mémoire. Parceque traiter le contexte comme une ressource,\nc'est aussi comprendre ce qu'il ne peut pas faire ; et ce qui doit être externalisé\nailleurs.\n.3 fenetre memoire\nFenêtre != mémoire\nIl y a une confusion que je vois dans pratiquement tous les projets d'agents que\nj'ai accompagnés.\nLes développeurs utilisent la fenêtre de contexte comme si c'était une mémoire.\nIls y accumulent l'historique de conversation, les préférences utilisateur, les décisions\nprécédentes. Et pendant une session, ça marche. L'agent semble se souvenir. Il fait\nréférence à ce qui a été dit. Il paraît cohérent.\nL'illusion est parfaite.\nJusqu'à ce que la session se ferme.\nAu prochain appel, le contexte est vide. L'agent repart de zéro. Il ne sait plus\nqui est l'utilisateur. Il ne se souvient pas des décisions prises. Il repose les mêmes\nquestions. Et l'utilisateur, lui, ne comprend pas pourquoi il doit tout réexpliquer à\nchaque fois.\nC'est l'une des sources les plus fréquentes de friction en production. Pas un bug.\nPas une erreur de modèle. Une confusion architecturale.\nLe problème : la fenêtre de contexte a trois limites fondamentales que la\nmémoire n'a pas.\nElle est temporaire . Elle existe le temps d'une requête, d'une session. Quand\nl'appel se termine, tout s'efface. Il n'y a pas de persistance native. Ce que le modèle\n\"savait\"dans l'échange précédent, il ne le sait plus maintenant.\nElle est limitée . Même avec 128K tokens, on ne peut pas stocker l'historique\ncomplet d'un utilisateur qui interagit avec le système depuis six mois. Et comme on l'a\nvu en 3.1, remplir la fenêtre ne signifie pas que le modèle traite tout avec la même\nattention.\nElle est non structurée . Toutest du texte. On ne peut pas faire de requêtes sur\nle contexte. On ne peut pas filtrer, trier, agrégrer. Si on cherche \"toutes les décisions\nprises concernant le client Dupont\", il faut parcourir la totalité de l'historique ; ce qui\nn'est ni fiable ni scalable.\nExemple concret :\nJ'ai travaillé sur un agent de service client pour une plateforme e-commerce.\nL'équipe avait fait quelque chose de raisonnable en apparence : à chaque requête, elle\ninjectait les 10 derniers échanges de l'utilisateur dans le contexte. L'agent semblait \"se\nsouvenir\" des interactions récentes.\nLe problème : un utilisateur qui revenait après deux semaines voyait l'agent lui\nreposer des questions déjà posées. Et un utilisateur avec un historique dense ; beaucoup\nd'achats, beaucoup de tickets de support ; consommait une quantité disproportionnée de\ntokens rien que pour reconstituer le contexte, avantmême d'avoirposé sa question.\nL'équipe avait confondu deux choses : l'historique récent (utile dans la session\ncourante) et la mémoire long terme (ce que l'agent doit savoir sur cet utilisateur, en\npermanence).\nCe qui devait rester dans la fenêtre : les derniers échanges de la session en\ncours. Ce qui devait être externalisé : les préférences utilisateur, l'historique des\ncommandes, les décisions prises lors de tickets précédents.\n# ? Tout dans le contexte ; illusion de mémoire def handle_query(user_id: str,\nquery: str, session_history: list) -> str: # On injecte l'historique complet dans le\ncontexte all_history = db.get_all_interactions(user_id) # Potentiellement des centaines\nd'échanges context = build_context( system_prompt=SYSTEM_PROMPT,\nhistory=all_history, # Tout, sans discernement query=query ) return\nllm.generate(context) # ? Séparation fenêtre / mémoire def handle_query(user_id: str,\nquery: str,session_history: list) -> str: # Mémoire long terme : récupérée depuis le store\nexterne user_profile = memory_store.get_profile(user_id) # Préférences, historique\nstructuré relevant_facts = memory_store.search(user_id, query) # Faits pertinents pour\ncette requête # Fenêtre : uniquement la session courante context = build_context(\nsystem_prompt=SYSTEM_PROMPT, user_profile=user_profile, # Compact, structuré\nrelevant_facts=relevant_facts, # Ciblé, retrieval dynamique\nsession_history=session_history, # Cette session uniquement query=query ) return\nllm.generate(context)\nLa différence n'est pas anecdotique. Dans le premier cas, on alloue des tokens à\ndes informations qu'on espère pertinentes. Dans le second, on alloue des tokens à des\ninformations qu'on sait pertinentes.\nCe qui doit être externalisé suit une logique simple : tout ce qui doit survivre à\nla fin d'une session. Les préférences utilisateur. Les décisions prises dans des échanges\nprécédents. Le state structuré de l'agent (où en est-on dans un workflowmulti-étapes ?).\nLes faits appris qui doiventinfluencer les prochaines interactions.\nCe qui reste dans la fenêtre : la session en cours. L'échange immédiat. Le\ncontexte dynamique récupéré par retrieval.\n[SCHÉMA 3.3] Fenêtre de contexte vs mémoire externalisée : ce qui disparaît\nvs ce qui persiste\nLa fenêtre de contexte est un espace de travail,pas un disque dur.\nLa confondre avec une mémoire, c'est construire un agent qui ne peut\nfonctionner que tant qu'on ne ferme pas la page. C'est acceptable en démo. En\nproduction, avec des utilisateurs réels qui reviennent, c'est une régression à chaque\nnouvelle session.\nLa Partie 4 reviendra en détail sur l'architecture mémoire complète. Mais avant\nça, il reste un problème dans la gestion du contexte dynamique : le retrieval. Parce que\ndécider quoi mettre dans la fenêtre à partir d'un store externe ; ça ne s'improvise pas\nnon plus.\n.4 retrieval mal concu\nRetrieval mal conçu = décisions erronées\nOn vient de voir que la fenêtre de contexte ne peut pas tenir lieu de mémoire.\nLa solution : externaliser les informations persistantes dans un store, et les injecter\ndynamiquement via du retrieval.\nSauf que le retrieval, c'est exactement là où beaucoup d'équipes bâclent le\ntravail.On configure un index vectoriel, on branche un top-k par défaut, et on considère\nque \"le retrievalest fait\". On passe à autre chose.\nLe problème, c'est que le retrieval n'est pas juste une recherche. C'est le\nmécanisme qui détermine ce que l'agent sait. Et ce que l'agent sait détermine ce qu'il\ndécide.\nUn mauvais retrieval, ce n'est pas \"des réponses légèrement moins bonnes\".\nC'est des décisions basées sur de mauvaises informations. Des décisions qui semblent\nconfiantes ; parce que l'agent a trouvé quelque chose ; mais qui sont factuellement\nerronées.\nJ'ai vu des agents de support donner des instructions de remboursement\nincorrectes. Des agents juridiques citer des procédures obsolètes. Des agents RH\nconfondre des régimes de congés distincts. Chaque fois, la cause profonde était la\nmême : le retrieval avait récupéré les mauvaises informations. Pas parce qu'elles\nn'étaient pas dans la base. Mais parce que le pipeline les avaitmal sélectionnées.\nLes trois erreurs qui reviennent\nErreur 1 : Top-k trop élevé\nC'est l'erreur la plus courante. Et la plus contre-intuitive.\nL'intuition dit : \"Plus je récupère de documents, plus j'ai de chances de trouver\nla bonne réponse.\" C'est faux. Et on a déjà vu pourquoi en section 3.1 avec le\nphénomène \"lost in the middle\" : quand on noie le modèle sous trop d'informations, il\nperd le fil.\nUn top-k=20 sur une base de connaissance de 10 000 articles, ça veut dire que\nle modèle reçoit 20 extraits de texte. Certains sont pertinents. D'autres sont proches\nsémantiquement mais pas utiles pour cette question précise. Et d'autres encore sont du\nbruit pur.\nLe résultat : le modèle fait une synthèse approximative.Il ne \"rate\" pas la bonne\ninformation ; elle est là, quelque part dans les 20 résultats. Mais elle est noyée. Et le\nmodèle pondère tout avec la même confiance de surface, sans distinguer ce qui est\ncentral de ce qui est accessoire.\nLa règle empirique que j'ai adoptée : top-k entre 3 et 5 après reranking.\nL'objectif n'est pas de donner au modèle tout ce qui pourrait être pertinent. L'objectif\nest de lui donner uniquement ce qui est pertinent.\nErreur 2 : Embeddings mal calibrés pour le domaine\nLes embeddings vectoriels capturent une \"proximité sémantique\" générique.\nDeux phrases proches dans l'espace vectoriel se ressemblent sur la base de leur sens\ngénéral.\nLe problème, c'est que la proximité sémantique générique n'est pas toujours\nalignée avecla pertinence métier.\nExemple concret :\nJ'ai travaillé avec une équipe qui construisait un agent de support pour une\nsociété d'assurance. Quand un client posait la question \"Comment faire une déclaration\nde sinistre pour mon véhicule ?\", le retrievalremontait régulièrement des articles sur les\ndéclarations de sinistre au sens large ; incluant des procédures pour l'assurance\nhabitation, l'assurance vie, et même des résultats sur les procédures judiciaires\nd'indemnisation.\nSémantiquement, tout ça est cohérent. \"Déclaration de sinistre\" est bien une\nnotion commune à tous ces documents.\nMais pour l'utilisateur qui veut déclarer un accident de voiture, recevoir des\ninstructions mélangées entre assurance auto et assurance habitation, c'est au mieux\ninutile, au pire trompeur.\nLa raison : les embeddings utilisés ; un modèle généraliste de base ; n'avaient\npas été calibrés sur le vocabulaire spécifique du domaine assurance. Les distinctions\nclés entre les branches (auto, habitation, vie) n'étaient pas assez marquées dans l'espace\nvectoriel pour produire une séparation nette dans les résultats.\nLa solution : fine-tuner les embeddings sur un corpus métier, ou utiliser des\nmétadonnées de filtrage (catégorie, type de produit, ligne de service) avant d'appliquer\nla recherche sémantique. L'embedding dit \"ces documents sont proches\" ; mais le filtre\ndit \"parmi les documents proches, ne garde que ceux qui concernent ce périmètre\".\nErreur 3 : Absence de reranking\nLe retrieval vectoriel fait une première passe rapide. Il classe les documents par\nproximité dans l'espace des embeddings. C'est efficace à grande échelle. Mais c'est une\napproximation.\nLe reranking est la deuxième passe : on prend les 15-20 premiers résultats du\nretrieval initial, et on les passe dans un modèle plus précis ; un cross-encoder ; qui\névaluela pertinence réelle de chaque document par rapport à la requête exacte.\nLa différence entre les deux : le retrieval vectoriel compare des représentations\ncompressées. Le reranker lit la requête et le document ensemble, dans leur intégralité,\net évalueleur relation directement.\nC'est plus lent. Et c'est ce qui change tout. Sans reranking, les 5 premiers\nrésultats sont \"les plus proches sémantiquement\". Avecreranking, les 3 résultats retenus\nsont \"les plus pertinents pour cette requête précise\". Ce n'est pas la même chose.\n# ? Pipeline naïf : retrieval seul, top-k élevé def retrieve_context(query: str,\nknowledge_base) -> list[str]: # 15 documents \"proches sémantiquement\" ; pas\nforcément utiles results = knowledge_base.similarity_search(query, k=15) return\n[doc.content for doc in results] # ? Pipeline robuste : filtrage métier + reranking + top-k\nserré def retrieve_context(query: str, knowledge_base, reranker) -> list[str]: # Étape 1 :\nretrieval large, filtré par métadonnées métier candidates =\nknowledge_base.similarity_search( query, k=20, filter={\"domain\":\nquery.detected_domain}# Périmètre métier ) # Étape 2 : reranking ; sélection des vrais\npertinents ranked = reranker.rank(query,[doc.content for doc in candidates]) # Étape 3 :\nne garder que le top 3-4 après reranking top_docs = ranked[:4] return [doc.content for\ndoc in top_docs]\nLa différence de qualité entre les deux pipelines est significative.Sur des agents\nde support que j'ai pu mesurer, passer d'un retrieval naïf top-k=15 à un pipeline avec\nreranking top-k=4 a réduit le taux de réponses incorrectes de 34% à 11%. Même base\nde connaissance. Même modèle. Retrievaldifférent.\nCe que ça donne en production\nVoiciun cas que j'ai suivi de près : un agent interne de gestion RH chargé de\nrépondre aux questions des employés sur leur conventioncollective.\nL'agent avait accès à une base documentaire de plusieurs centaines de pages :\nconvention collective, accords d'entreprise, fiches pratiques, FAQ. Le retrieval initial\nutilisait un top-k=10 avecdes embeddings généralistes et aucun reranking.\nUn employé pose la question : \"Est-ce que je peux prendre des congés\nsupplémentaires pour un événementfamilial ?\"\nLe retrieval remonte 10 documents. Parmi eux : l'article sur les congés pour\névénement familial (pertinent), mais aussi des extraits sur les congés payés classiques\n(proche sémantiquement), sur le compte épargne-temps (mentionné dans le même\nchapitre de la convention),et sur les absences autorisées en général.\nL'agent synthétise tout ça. Sa réponse n'est pas fausse dans ses grandes lignes ;\nmais les jours de congé qu'il mentionne sont incorrects, parce qu'il a fusionné des\ninformations qui correspondent à des régimes différents. Il présente ça avec assurance.\nL'employé repart avecde mauvaisesinformations.\nL'erreur n'est pas dans le modèle. L'erreur est dans ce qu'on lui a donné à lire.\nAprès refonte du pipeline ; embeddings fine-tunés sur le lexique RH, filtrage\npar type de document (convention vs accord vs FAQ),reranking, top-k réduit à 3 ; le\nmême agent répondait correctement à 91% des questions sur la convention collective.\nContre 62% avantla refonte.\n[DIAGRAMME 3.4] Pipeline de retrieval naïf vs optimisé ; impact sur la\nqualité des décisions\nLe retrieval n'est pas un paramètre, c'est un composant\nC'est le point clé à retenir.\nLe retrieval n'est pas quelque chose qu'on configure une fois et qu'on oublie.\nC'est un composant à part entière du système, avec ses propres métriques (précision,\nrappel, MRR), ses propres tests, ses propres cycles d'amélioration.\nLa question à se poser pour chaque cas d'usage : \"Est-ce que les documents que\nmon agent reçoit sont réellement les bons documents pour prendre cette décision ?\" Pas\n\"est-ce que le retrieval retourne des résultats ?\" ; des résultats, il en retourne toujours.\nLa question, c'est la qualité de ces résultats.\nUn retrievalqui remonte les mauvais documents avec confiance, c'est pire qu'un\nretrievalqui ne remonte rien. Parce que dans le second cas, l'agent sait qu'il ne sait pas.\nDans le premier,il croit savoir; et il décide en conséquence.\nMaintenant qu'on sait comment ramener les bonnes informations, il reste une\nquestion : comment les allouer dans le budget de contexte ? Entre le retrieval,le prompt\nsystème, l'historique de session, et la requête elle-même, tout ne peut pas entrer. Il faut\nchoisir.Et ce choix a des règles.\n.5 budget contexte priorisation\nBudget de contexte et priorisation\nVoilà la situation. Le retrieval est corrigé. Le pipeline remonte maintenant les\nbons documents, dans le bon ordre, sans noyer le modèle. Mais il reste un problème.\nToutne rentre pas.\nUne fenêtre de 128K tokens, ça paraît immense. En production, le budget\ns'épuise vite. Le prompt système : 500 tokens. L'historique de conversation de la\nsession en cours : 3 000 tokens. Les trois documents récupérés par le retrieval après\nreranking : 2 000 tokens. La requête utilisateur : 200 tokens. Les résultats des outils\nexécutésdans la boucle : 1 500 tokens.\nOn est à 7 200 tokens avantd'avoirgénéré la moindre réponse.\nSur une session longue, l'historique seul peut dépasser 20 000 tokens. Multiplie\npar des centaines d'utilisateurs en parallèle, et le \"128K tokens, c'est illimité\" devient\ntrès rapidement \"128K tokens, il faut choisir ce qu'on garde\".\nLa question n'est pas \"Est-ce que ça rentre ?\". Elle est : \"Si ça ne rentre pas tout,\nqu'est-ce qu'on coupe ?\"\nCe qui ne se coupe pas\nLa première étape d'une gestion saine du budget, c'est de définir les priorités\nabsolues. Ce qui doit toujours être là, quoi qu'il arrive.\nLe prompt système est intouchable. C'est l'identité de l'agent, ses règles métier,\nses contraintes de comportement. Si on le compresse ou qu'on en enlève des parties, le\ncomportement dérive. On a vu en section 3.2 ce que ça donne en pratique : des agents\nbancaires qui oublient leurs règles de confidentialité, des agents support qui ne savent\nplus ce qu'ils peuvent promettre.\nLa requête utilisateur est intouchable. L'agent doit traiter ce que l'utilisateur\ndemande ; pas une version tronquée ou résumée de sa demande. Résumer la requête\navantde la passer au modèle, c'est risquer de perdre le détail précis qui change tout.\nLes documents retrievalde haute pertinence ; les 3 à 4 retenus après reranking ;\nsont prioritaires. C'est pour ça qu'on a construit un pipeline robuste en 3.4 : pour avoir\npeu de documents de haute qualité, pas beaucoup de documents bruyants. Ces\ndocuments gagnent leur place dans le contexte.\nToutle reste est négociable.\nCe qui se compresse\nLe premier levier, c'est la compression. Résumer les parties du contexte qui\nn'ont pas besoin d'être intégrales.\nL'historique de conversation en est l'exemple canonique. Sur une session de 20\néchanges, les 15 premiers n'ont généralement pas besoin d'être là mot pour mot. L'agent\na besoin du fil conducteur ; les décisions prises, les informations échangées, le\npérimètre établi ; pas de la transcription complète.\nExemple concret :\nJ'ai travaillé sur un agent de support technique pour une plateforme SaaS. Les\nsessions pouvaient durer jusqu'à 30-40 échanges. Sans gestion du contexte, l'historique\ncomplet dépassait systématiquement 15 000 tokens. Résultat : l'agent perdait le fil des\npremières décisions, recommençait à poser des questions déjà posées, et produisait des\nréponses incohérentes avecce qui avaitété convenuen début de session.\nLa solution n'était pas de couper l'historique brutalement. C'était de le résumer\nprogressivement. Au-delà de 8 échanges, les échanges anciens passaient dans un\nrésumé structuré : \"Problème identifié : erreur SSL sur le connecteur Salesforce.\nActions déjà tentées : réinstallation du connecteur, vérification des certificats. Statut :\nnon résolu.\" Deux cents tokens au lieu de 6 000. Toutel'information utile, sans le bruit.\n# ? Historique brut qui grossit sans limite def build_context(history: list[dict],\nquery: str, docs: list[str]) -> str: # L'historique complet : potentiellement des milliers de\ntokens history_text = \"\\n\".join([f\"{m['role']}: {m['content']}\" for m in history]) return\nf\"{SYSTEM_PROMPT}\\n\\n{history_text}\\n\\nDocuments:\\n{chr(10).join(docs)}\\n\\nUser:\n{query}\" # ? Historique compressé au-delà du seuil de rétention def\nbuild_context(history: list[dict], query: str, docs: list[str]) -> str:\nRETENTION_WINDOW = 6 # Garder les 6 derniers échanges intacts if len(history) >\nRETENTION_WINDOW: old_exchanges = history[:-RETENTION_WINDOW]\nsummary = summarize_exchanges(old_exchanges) # Appel LLM léger recent =\nhistory[-RETENTION_WINDOW:] history_text = ( f\"[Résumé des échanges\nprécédents]\\n{summary}\\n\\n\" f\"[Échanges récents]\\n\" \"\\n\".join([f\"{m['role']}:\n{m['content']}\" for m in recent]) ) else: history_text = \"\\n\".join([f\"{m['role']}:\n{m['content']}\" for m in history]) return\nf\"{SYSTEM_PROMPT}\\n\\n{history_text}\\n\\nDocuments:\\n{chr(10).join(docs)}\\n\\nUser:\n{query}\"\nCe qui s'évince\nLe deuxième levier, c'est l'éviction. Quand le budget est plein, quelque chose\ndoit partir. Et ce quelque chose, c'est ce qui est le moins pertinent pour la décision à\nprendre maintenant.\nLa logique LRU (Least Recently Used) appliquée à l'historique ; les échanges\nles plus anciens partent en premier après compression ; est simple et fonctionne pour la\nplupart des cas.\nMais LRUseul n'est pas suffisant.Certains échanges anciens sont critiques : une\ncontrainte exprimée en début de session (\"je ne veux pas qu'on modifie le fichier de\nconfiguration\"), une décision prise ensemble, une information de contexte unique.\nÉvincer ces échanges par pur critère de date, c'est risquer de perdre des informations\nirremplaçables.\nLa distinction utile est entre deux types d'échanges : les échanges factuels, qui\npeuvent être résumés ou évincés sans perte critique, et les échanges décisionnels, qui\ndoivent être préservés ou résumés avec une fidélité élevée. Cette séparation ne se fait\npas automatiquement ; elle se configure explicitement, souvent en taguant les échanges\nimportants pendant la session.\nCe qui se découpe intelligemment\nLe troisième levier, c'est le chunking. Pas le chunking au moment de\nl'indexation ; mais le découpage des documents au moment de leur injection dans le\ncontexte.\nUn document de 800 tokens récupéré par le retrieval n'a pas forcément besoin\nd'entrer en totalité. Si la requête porte sur un point précis d'une procédure, les 100\ntokens pertinents sont plus utiles que les 800 tokens du document complet. Le reste est\ndu bruit qui dilue l'attention du modèle ; exactement ce qu'on a cherché à éviter depuis\nla section 3.1.\nÇa suppose des chunks sémantiques ; pas des découpes de taille fixe à 512\ntokens, mais des unités cohérentes d'information : un paragraphe, une section, un\narticle. Des blocs qui ont un sens complet isolément.\n[TABLEAU3.5] Allocation du budget de contexte : zones de priorité, stratégies\net limites par composant\nUn framework pour allouer le budget\nEn pratique, voici comment je structure l'allocation du budget de contexte sur\nles agents que je déploie.\nLe budget total est divisé en quatre zones. La zone réservée couvre le prompt\nsystème et la requête utilisateur ; fixe, non compressible, toujours allouée en premier.\nLa zone principale couvre les documents retrieval de haute pertinence ; le c?ur de\nl'information utile pour cette décision. La zone secondaire couvre l'historique récent de\nla session ; configurable, compressible au-delà d'un seuil. La zone tampon couvre les\nrésultats des outils et les métadonnées accumulées pendant la boucle.\nclass ContextBudget: \"\"\"Gestionnaire de budget de contexte avec priorités\nexplicites.\"\"\" def __init__(self, max_tokens: int = 8000): self.max_tokens =\nmax_tokens # Allocation par zone (en % du budget total) self.zones = { \"reserved\":\nint(max_tokens * 0.10), # Prompt système + requête \"primary\": int(max_tokens *\n0.40), # Documents retrieval \"secondary\": int(max_tokens * 0.35), # Historique de\nsession \"buffer\": int(max_tokens * 0.15), # Outils + métadonnées } def build(self,\nsystem_prompt: str,query: str,docs: list[str], history: list[dict]) -> str: # Zone réservée :\ntoujours intégralement reserved = f\"{system_prompt}\\n\\nUser: {query}\" # Zone\nprincipale : top docs après reranking, jusqu'au budget primary = self._fit_docs(docs,\nself.zones[\"primary\"]) # Zone secondaire : historique compressé si nécessaire\nsecondary = self._fit_history(history, self.zones[\"secondary\"]) return\nf\"{reserved}\\n\\n{primary}\\n\\n{secondary}\" def _fit_docs(self, docs: list[str], budget:\nint) -> str: result, tokens_used = [], 0 for doc in docs: # Déjà triés par pertinence\ndécroissante doc_tokens = count_tokens(doc) if tokens_used + doc_tokens <= budget:\nresult.append(doc) tokens_used += doc_tokens else: break # On coupe, pas question de\ndépasser return \"\\n\\n\".join(result) def _fit_history(self, history: list[dict], budget: int) ->\nstr: recent = history[-6:] # Fenêtre de rétention recent_text = \"\\n\".join([f\"{m['role']}:\n{m['content']}\" for m in recent]) if count_tokens(recent_text) <= budget: return\nrecent_text # Budget insuffisant même pour la fenêtre récente : compression forcée\nreturn summarize_exchanges(recent, max_tokens=budget)\nLe budget de contexte est une décision d'architecture\nLa gestion du budget n'est pas un problème d'optimisation technique. C'est une\ndécision d'architecture qui reflète les priorités du système.\nDécider que le prompt système est intouchable, c'est décider que le\ncomportement de l'agent est non négociable. Décider que l'historique récent prime sur\nles documents retrieval pour certains cas d'usage, c'est une décision métier. Décider à\nquel seuil on compresse et ce qu'on résume, ça touche directement à la qualité des\ndécisions.\nCes décisions méritent d'être explicites. Pas cachées dans un paramètre\nmax_tokens quelque part dans le code. Documentées, versionnées, et révisées quand le\ncomportement de l'agent dérive.\nLe contexte n'est pas seulement une ressource technique à optimiser. C'est le\nreflet de ce que l'agent sait, de ce qu'il se souvient, de ce qu'on juge important pour ses\ndécisions. Le gérer avecsoin, c'est gérer la qualité du raisonnement de l'agent.\nOn a maintenant les outils pour traiter le contexte comme ce qu'il est : une\nressource à allouer avec intention, pas un espace de stockage qu'on remplit jusqu'à\ndébordement.\nLa prochaine erreur structurelle est encore plus fondamentale. On a parlé de ce\nque l'agent sait dans une session. Mais que se passe-t-il entre les sessions ? Un agent\nqui sait tout maintenant peut ne rien savoir dans dix minutes ; quand la session se\ntermine. L'agent est, par nature, amnésique.\n"
