  /* ============ SIDEBAR ============ */
  function buildSidebar(){
    var list = document.getElementById('agentList');
    list.innerHTML = ''; agentEls = {};
    if(countIv){ clearInterval(countIv); countIv=null; }
    ORDER.forEach(function(id, idx){
      var a = A()[id];
      var node = el('div','agent'+(id==='profil'?' agent--feature':''));
      node.setAttribute('role','button'); node.setAttribute('tabindex','0');
      node.innerHTML = '<span class="agent__dot"></span>'+
        '<span class="agent__meta"><span class="agent__name">'+a.name+
          (id==='profil'?'<span class="agent__tag">'+(LANG==='fr'?'brief':'brief')+'</span>':'')+'</span>'+
        '<span class="agent__role">'+a.role+'</span></span>';
      node.addEventListener('click', function(){ trigger(id); });
      node.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){e.preventDefault();trigger(id);} });
      list.appendChild(node);
      agentEls[id] = node;
      setTimeout(function(){ node.classList.add('in'); }, 220 + idx*100);
    });
    var n = ORDER.length, shown=0;
    var sc=document.getElementById('sideCount'), so=document.getElementById('agOnline');
    sc.textContent = '— '+S().online; so.textContent = '0';
    countIv = setInterval(function(){ shown++; sc.textContent = shown+' '+S().online; so.textContent = shown;
      if(shown>=n){ clearInterval(countIv); countIv=null; } }, 120);
  }

  /* ============ TABS ============ */
  function resetTabs(){
    tabsEl.innerHTML='';
    var t=el('div','tab active','<span class="dot"></span>welcome');
    t.setAttribute('data-tab','welcome'); tabsEl.appendChild(t);
  }
  function activateTab(id, label){
    var existing = tabsEl.querySelector('[data-tab="'+id+'"]');
    tabsEl.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    if(existing){ existing.classList.add('active'); return; }
    var t = el('div','tab active','<span class="dot"></span>'+label);
    t.setAttribute('data-tab', id);
    t.addEventListener('click', function(){ trigger(id); });
    tabsEl.appendChild(t); tabsEl.scrollLeft = tabsEl.scrollWidth;
  }

  /* ============ RUN ============ */
  function trigger(id){ if(!A()[id]) return; chain = chain.then(function(){ return runAgent(id); }); }

  async function runAgent(id){
    var g = gen, a = A()[id];
    running = true; setBusy(true); setActiveAgent(id); activateTab(id, a.tab);

    var u = el('div','msg user','<span class="caret">❯</span><span class="cmd">'+S().runVerb+' '+a.name+'</span>');
    logInner.appendChild(u); scrollEnd();
    await sleep(180); if(g!==gen) return;

    var msg = el('div','msg'), ag = el('div','ag');
    var col = a.color ? ' style="color:'+a.color+'"' : '';
    ag.innerHTML = '<div class="ag__head"><span class="ag__badge"'+col+'>'+a.badge+'</span>'+
      '<span class="ag__name"'+col+'>'+a.name+'</span><span class="ag__role">'+a.role+'</span></div>';
    var bodyWrap = el('div'); ag.appendChild(bodyWrap); msg.appendChild(ag); logInner.appendChild(msg); scrollEnd();

    var tool = el('div','tool',
      '<span class="gear">⚙</span><span class="fn">'+a.tool.fn+'</span>'+
      '<span class="arg">'+a.tool.arg+'</span><span class="spin">…running</span>');
    bodyWrap.appendChild(tool); scrollEnd();
    await sleep(600); if(g!==gen) return;
    tool.querySelector('.spin').outerHTML = '<span class="res">✓ '+a.tool.res+'</span>';

    var p = el('p','prose'); bodyWrap.appendChild(p);
    await typeInto(p, a.intro, 12); if(g!==gen) return;
    await renderType(a.type, a.data, bodyWrap); if(g!==gen) return;

    running = false; setBusy(false); setActiveAgent(null); scrollEnd();
  }

  function setBusy(b){ send.disabled = b;
    document.querySelectorAll('#langtog button').forEach(function(x){ x.disabled = b; }); }
  function setActiveAgent(id){
    ORDER.forEach(function(k){ if(agentEls[k]){ agentEls[k].classList.toggle('active', k===id); agentEls[k].classList.remove('busy'); } });
    if(id && agentEls[id]) agentEls[id].classList.add('busy');
  }

  /* ============ WELCOME ============ */
  async function welcome(switched){
    var g = gen;
    if(switched){
      var sys = el('div','tool',
        '<span class="gear">⚙</span><span class="fn">set_language</span>'+
        '<span class="arg">'+LANG+'</span><span class="res">✓ '+S().langName[LANG]+'</span>');
      logInner.appendChild(sys); scrollEnd();
    }
    await sleep(switched?160:(reduce?0:480)); if(g!==gen) return;

    var msg = el('div','msg'), ag = el('div','ag');
    ag.innerHTML = '<div class="ag__head"><span class="ag__badge" style="color:var(--accent)">◇</span>'+

      '<span class="ag__role">'+S().orientRole+'</span></div>';

    var p = el('p','prose'); bw.appendChild(p);

    var chips = el('div','chips');

      chip.addEventListener('click', function(){ trigger(c[0]); });

  /* ============ ROUTING ============ */
  function route(t){
    t = t.toLowerCase();
    if(/help|aide|\?|menu/.test(t)) return 'help';
    if(/clear|cls|efface/.test(t)) return 'clear';
    if(/profil|profile|brief|r[ée]sum[ée]|resume|30|senior|fullstack|recrut/.test(t)) return 'profil';
    if(/projet|r[ée]alis|produit|revise|work|app/.test(t)) return 'realisations';
    if(/livre|ouvrage|book|essai|publi|ia|ai|agent|llm/.test(t)) return 'livre';
    if(/parcours|carri|career|exp[ée]rience|h[ôo]tel|histoire|story/.test(t)) return 'parcours';
    if(/stack|techno|comp[ée]tence|skill|outil|tool|langage|language|python|django/.test(t)) return 'stack';
    if(/[ée]crit|note|article|blog|id[ée]e|advocate|writing|essay/.test(t)) return 'notes';
    if(/contact|mail|email|joindre|reach|hire|embauch|dispo|cv/.test(t)) return 'contact';
    return null;
  }
  function escapeHtml(s){ return s.replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function fallback(text){
    chain = chain.then(async function(){
      var g = gen;
      var u = el('div','msg user','<span class="caret">❯</span><span class="cmd">'+escapeHtml(text)+'</span>');
      logInner.appendChild(u); scrollEnd(); await sleep(160); if(g!==gen) return;
      var msg=el('div','msg'), ag=el('div','ag');
      ag.innerHTML='<div class="ag__head"><span class="ag__badge" style="color:var(--accent)">◇</span>'+
        '<span class="ag__name" style="color:var(--accent)">'+S().orientName+'</span></div>';
      var bw=el('div'); ag.appendChild(bw); msg.appendChild(ag); logInner.appendChild(msg);
      var p=el('p','prose'); bw.appendChild(p);
      await typeInto(p, S().fallback, 13); if(g!==gen) return;
      var chips=el('div','chips');
      S().chips.forEach(function(c){ var chip=el('button','chip',c[1]); chip.addEventListener('click',function(){trigger(c[0]);}); chips.appendChild(chip); });
      bw.appendChild(chips); scrollEnd();
    });
  }

  function submit(){
    var v = input.value.trim(); if(!v) return; input.value='';
    var low = v.toLowerCase();
    if(low==='/en'||low==='/lang en'||low==='english'||low==='anglais'){ setLang('en'); return; }
    if(low==='/fr'||low==='/lang fr'||low==='français'||low==='francais'||low==='french'){ setLang('fr'); return; }
    var r = route(v);
    if(r==='clear'){ gen++; logInner.innerHTML=''; chain=Promise.resolve(); autoBrief=true; welcome(false); return; }
    if(r==='help'){ welcome(false); return; }
    if(r){ trigger(r); } else { fallback(v); }
  }

  /* ============ LANGUAGE SWITCH ============ */
  function setLang(l){
    if(l===LANG || running) return;
    LANG = l; gen++; running=false; send.disabled=false;
    applyChrome(); buildSidebar(); resetTabs();
    chain = Promise.resolve(); logInner.innerHTML=''; autoBrief=true;
    updateToggle();
    welcome(true);
  }
  function updateToggle(){
    document.querySelectorAll('#langtog button').forEach(function(b){
      b.classList.toggle('on', b.getAttribute('data-l')===LANG);
    });
  }

  /* ============ INIT ============ */
  send.addEventListener('click', submit);
  input.addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
  document.querySelectorAll('#langtog button').forEach(function(b){
    b.addEventListener('click', function(){ setLang(b.getAttribute('data-l')); });
  });

  (function(){
    var clock=document.getElementById('clock');
    function tick(){ var d=new Date(); clock.textContent =
      String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
    tick(); setInterval(tick,15000);
    setTimeout(function(){ document.getElementById('meter').style.width='100%'; }, 600);
  })();

  applyChrome();
  updateToggle();
  buildSidebar();
  welcome(false);
})();
